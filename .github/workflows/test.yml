name: Tests

# Runs the scoring/money-math smoke tests on every push to master.
# Zero dependencies (pure Node), so it's fast. A red ✗ on a commit means a
# scoring calc changed in a way that broke a known-correct scenario.
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  scoring:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run scoring engine tests
        run: node tests/run.js
