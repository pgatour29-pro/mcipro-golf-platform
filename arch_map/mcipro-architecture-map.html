<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>MciPro · Architecture Map</title>
<style>
  :root{
    --bg:#0b0f14; --panel:#111821; --line:#1f2a37; --fg:#e6edf3; --muted:#9fb0c3;
    --entry:#f59e0b; --client:#3b82f6; --function:#22c55e; --table:#14b8a6; --rpc:#fb923c; --external:#64748b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;overflow:hidden}
  /* slim single-row top bar */
  #top{position:fixed;top:0;left:0;right:0;height:44px;display:flex;align-items:center;gap:8px;padding:0 10px;
       background:rgba(11,15,20,.96);border-bottom:1px solid var(--line);z-index:12}
  #top h1{font-size:14px;margin:0;font-weight:700;white-space:nowrap}
  #top h1 b{color:var(--function)}
  #stat{margin-left:auto;color:var(--muted);font-size:11px;white-space:nowrap}
  button.btn{background:#0d131b;border:1px solid #253243;color:var(--fg);border-radius:8px;padding:7px 10px;cursor:pointer;font-size:13px}
  button.btn:hover{border-color:var(--function)}
  button.btn.on{border-color:var(--function);background:rgba(34,197,94,.15);color:#86efac}
  #menutoggle{font-size:16px;padding:6px 10px;line-height:1}
  input,select{background:#0d131b;border:1px solid #253243;border-radius:8px;color:var(--fg);padding:8px 10px;font-size:13px}
  /* controls: inline on desktop, collapsible drawer on mobile */
  #controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  #search{width:170px}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{font-size:12px;padding:5px 9px;border-radius:999px;border:1px solid var(--line);cursor:pointer;user-select:none;display:flex;align-items:center;gap:6px}
  .chip .dot{width:9px;height:9px;border-radius:50%}
  .chip.off{opacity:.35;text-decoration:line-through}
  #menutoggle{display:none}
  @media(max-width:880px){
    #menutoggle{display:inline-block}
    #controls{position:fixed;top:44px;left:0;right:0;flex-direction:column;align-items:stretch;gap:10px;
      background:var(--panel);border-bottom:1px solid var(--line);padding:12px;display:none;z-index:11;max-height:75vh;overflow:auto}
    body.menu-open #controls{display:flex}
    #search,#feature{width:100%}
    .chip{padding:8px 11px;font-size:13px}
  }
  #cy{position:fixed;left:0;right:0;bottom:0;top:44px}
  #side{position:fixed;top:54px;right:8px;width:min(300px,86vw);max-height:calc(100% - 70px);overflow:auto;background:var(--panel);
        border:1px solid var(--line);border-radius:14px;padding:14px;display:none;z-index:13;box-shadow:0 8px 30px rgba(0,0,0,.5)}
  #side h2{margin:0 0 2px;font-size:16px;word-break:break-all}
  #side .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;margin:6px 6px 10px 0;color:#0b0f14;font-weight:700}
  #side h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 5px}
  #side a{display:block;color:var(--fg);text-decoration:none;padding:5px 6px;border-radius:6px;font-size:13px;cursor:pointer;word-break:break-all}
  #side a:hover{background:#0d131b;color:var(--function)}
  #side .close{float:right;cursor:pointer;color:var(--muted);font-size:20px;line-height:1}
  /* legend: small toggle button + dismissible panel */
  #legBtn{position:fixed;bottom:10px;left:10px;z-index:11}
  #legend{position:fixed;bottom:46px;left:10px;background:rgba(17,24,33,.95);border:1px solid var(--line);border-radius:10px;
    padding:9px 12px;font-size:12px;color:var(--muted);z-index:11;max-width:min(360px,90vw);display:none}
  #legend.show{display:block}
  #legend b{color:var(--fg)} #legend .ek{display:inline-block;width:16px;height:0;border-top:3px solid;vertical-align:middle;margin:0 4px}
  #legend .row{margin-top:5px}
  #legend .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin:0 3px 0 7px}
</style>
</head>
<body>
<div id="top">
  <button class="btn" id="menutoggle" aria-label="menu">☰</button>
  <h1>MyCaddi<b>Pro</b> Map</h1>
  <div id="controls">
    <input id="search" placeholder="Search nodes…"/>
    <select id="feature" title="Isolate one feature's data flow"><option value="">▸ Feature: All</option></select>
    <button class="btn" id="cluster">Cluster</button>
    <button class="btn" id="issues">⚠ Issues</button>
    <div class="chips" id="filters"></div>
  </div>
  <button class="btn" id="fit">Fit</button>
  <span id="stat"></span>
</div>
<div id="cy"></div>
<button class="btn" id="legBtn">Legend</button>
<div id="legend">
  <div><b>Nodes:</b>
    <span class="dot" style="background:#f59e0b"></span>entry<span class="dot" style="background:#3b82f6"></span>client
    <span class="dot" style="background:#22c55e"></span>function<span class="dot" style="background:#14b8a6"></span>table
    <span class="dot" style="background:#fb923c"></span>rpc<span class="dot" style="background:#64748b"></span>external</div>
  <div class="row"><b>Edges:</b><span class="ek" style="border-color:#22c55e"></span>client→fn
    <span class="ek" style="border-color:#14b8a6"></span>→table<span class="ek" style="border-color:#fb923c"></span>→rpc
    <span class="ek" style="border-color:#64748b"></span>→ext · <b style="color:#5eead4">bold = fn→table</b></div>
  <div class="row"><b>Status:</b> <span style="display:inline-block;width:11px;height:11px;border-radius:50%;border:3px solid #f59e0b;vertical-align:middle;margin:0 4px"></span>needs work
    <span style="display:inline-block;width:11px;height:11px;border-radius:50%;border:3px solid #ef4444;vertical-align:middle;margin:0 4px 0 8px"></span>broken</div>
</div>
<div id="side"><span class="close" onclick="document.getElementById('side').style.display='none'">×</span><div id="sidebody"></div></div>

const els=[];

for(const n of GRAPH.nodes) els.push({data:{id:n.id,label:n.label,type:n.type,domain:n.domain,status:n.status||'',note:n.note||''}});
for(const e of GRAPH.edges){
  const sp=nodeById[e.source], tp=nodeById[e.target];
  const ftab = sp&&tp&&sp.type==='function'&&tp.type==='table';
  els.push({data:{id:e.source+'>'+e.target+':'+e.kind,source:e.source,target:e.target,kind:e.kind,ftab:ftab?1:0}});
}

const cy=window.cy=cytoscape({
  container:document.getElementById('cy'), elements:els, wheelSensitivity:.25,
  style:[
    {selector:'node',style:{'background-color':n=>COLORS[n.data('type')]||'#888','label':'data(label)','color':'#cdd9e5',
      'font-size':9,'text-valign':'bottom','text-margin-y':3,'width':n=>SIZE[n.data('type')]||22,
      'height':n=>SIZE[n.data('type')]||22,'border-width':1,'border-color':'#0b0f14','text-max-width':90,'text-wrap':'ellipsis'}},
    {selector:'node[type="entry"]',style:{'font-size':14,'font-weight':'bold','color':'#fde68a','text-valign':'center','text-margin-y':0}},
    {selector:'node.group',style:{'background-color':'#0e151d','background-opacity':.6,'border-width':1,'border-color':'#2b3a4d',
      'shape':'round-rectangle','label':'data(label)','color':'#7d8ea0','font-size':13,'font-weight':'bold',
      'text-valign':'top','text-halign':'center','text-margin-y':-4,'padding':'14px'}},
    {selector:'node[status="warn"]',style:{'border-width':4,'border-color':'#f59e0b'}},
    {selector:'node[status="broken"]',style:{'border-width':4,'border-color':'#ef4444'}},
    {selector:'edge',style:{'width':e=>e.data('ftab')?2.4:1,'line-color':e=>EKIND[e.data('kind')]||'#2b3a4d',
      'curve-style':'bezier','target-arrow-shape':'triangle','target-arrow-color':e=>EKIND[e.data('kind')]||'#2b3a4d',
      'arrow-scale':.6,'opacity':e=>e.data('ftab')?.85:.4}},
    {selector:'.dim',style:{'opacity':.06}},
    {selector:'.hi',style:{'opacity':1,'line-color':'#22c55e','target-arrow-color':'#22c55e','width':2.4,'z-index':99}},
    {selector:'node.hi',style:{'border-width':3,'border-color':'#22c55e','opacity':1,'z-index':99}},
    {selector:'.hidden',style:{'display':'none'}}
  ],
  layout:{name:'fcose',animate:false,nodeRepulsion:9000,idealEdgeLength:70,nodeSeparation:90}
});
cy.one('layoutstop',()=>cy.fit(cy.elements('[!isParent]'),30));
function relayout(){ cy.layout({name:'fcose',animate:false,nodeRepulsion:9000,idealEdgeLength:70,nodeSeparation:90,packComponents:true}).run(); }

const filters=document.getElementById('filters'); const active=new Set(Object.keys(TYPES));
for(const t of Object.keys(TYPES)){
  const c=document.createElement('div'); c.className='chip'; c.dataset.t=t;
  c.innerHTML=`<span class="dot" style="background:${COLORS[t]}"></span>${TYPES[t]}`;
  c.onclick=()=>{active.has(t)?(active.delete(t),c.classList.add('off')):(active.add(t),c.classList.remove('off')); applyFilter();};
  filters.appendChild(c);
}
function applyFilter(){
  cy.nodes('[!isParent]').forEach(n=>n.toggleClass('hidden',!active.has(n.data('type'))||(featNodes&&!featNodes.has(n.id()))));
  cy.edges().forEach(e=>e.toggleClass('hidden',e.source().hasClass('hidden')||e.target().hasClass('hidden')));
  cy.nodes('.group').forEach(g=>g.toggleClass('hidden', g.children(':visible').length===0));
  updateStat();
}
function updateStat(){
  const vn=cy.nodes('[!isParent]').filter(n=>!n.hasClass('hidden')).length;
  const ve=cy.edges().filter(e=>!e.hasClass('hidden')).length;
  document.getElementById('stat').textContent=`${vn} · ${ve}`;
}

let featNodes=null;
const fsel=document.getElementById('feature');
GRAPH.domains.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent='▸ Feature: '+d;fsel.appendChild(o);});
fsel.onchange=()=>{
  const d=fsel.value;
  if(!d){featNodes=null;}
  else{const core=cy.nodes('[!isParent]').filter(n=>n.data('domain')===d);
       featNodes=new Set(core.closedNeighborhood().nodes('[!isParent]').map(n=>n.id()));}
  applyFilter(); cy.fit(cy.elements(':visible'),40); closeMenu();
};

let clustered=false;
document.getElementById('cluster').onclick=function(){
  clustered=!clustered; this.classList.toggle('on',clustered);
  cy.batch(()=>{cy.nodes('[!isParent]').forEach(n=>n.move({parent: clustered? 'dom:'+n.data('domain') : null}));});
  cy.nodes('.group').forEach(g=>g.style('display', clustered? 'element':'none'));
  relayout(); setTimeout(()=>cy.fit(cy.elements(':visible'),35),60);
};
cy.nodes('.group').style('display','none');

// (status) issues filter — isolate flagged connectors + neighbors
let issuesOn=false;
const flagged=GRAPH.nodes.filter(n=>n.status).map(n=>n.id);
const ibtn=document.getElementById('issues');
ibtn.textContent='⚠ Issues ('+flagged.length+')';
ibtn.onclick=function(){
  issuesOn=!issuesOn; this.classList.toggle('on',issuesOn);
  if(issuesOn){ fsel.value=''; const core=cy.collection(flagged.map(id=>cy.$id(id)));
    featNodes=new Set(core.closedNeighborhood().nodes('[!isParent]').map(n=>n.id())); }
  else featNodes=null;
  applyFilter(); cy.fit(cy.elements(':visible'),40); closeMenu();
};

cy.on('tap','node',evt=>{
  const n=evt.target; if(n.data('isParent')) return;
  cy.elements().addClass('dim'); n.closedNeighborhood().removeClass('dim').addClass('hi'); n.addClass('hi');
  const out=n.outgoers('node[!isParent]'), inc=n.incomers('node[!isParent]');
  const link=a=>a.map(x=>`<a onclick="focusNode('${x.id()}')">${x.data('label')} <span style="color:${COLORS[x.data('type')]}">●</span></a>`).join('')||'<span style="color:#5b6b7d">none</span>';
  const st=n.data('status'), note=n.data('note');
  const banner = st ? `<div style="background:${st==='broken'?'#450a0a':'#451a03'};border:1px solid ${st==='broken'?'#ef4444':'#f59e0b'};border-radius:8px;padding:8px 10px;margin:4px 0 10px;font-size:12px;color:#fde68a">⚠ ${st==='broken'?'BROKEN':'NEEDS WORK'} — ${note}</div>` : '';
  document.getElementById('sidebody').innerHTML=
    `<h2>${n.data('label')}</h2><span class="tag" style="background:${COLORS[n.data('type')]}">${TYPES[n.data('type')]}</span>`+
    `<span class="tag" style="background:#334155;color:#cbd5e1">${n.data('domain')}</span>`+banner+
    `<h3>Depends on (${out.length})</h3>${link(out)}<h3>Used by (${inc.length})</h3>${link(inc)}`;
  document.getElementById('side').style.display='block';
});
cy.on('tap',evt=>{if(evt.target===cy){cy.elements().removeClass('dim hi');document.getElementById('side').style.display='none';}});
window.focusNode=id=>{const n=cy.$id(id);cy.animate({center:{eles:n},zoom:1.4},{duration:350});n.emit('tap');};

document.getElementById('fit').onclick=()=>cy.fit(cy.elements(':visible'),35);
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase(); cy.elements().removeClass('dim hi'); if(!q)return;
  const m=cy.nodes('[!isParent]').filter(n=>n.data('label').toLowerCase().includes(q));
  cy.elements().addClass('dim'); m.removeClass('dim').addClass('hi'); m.connectedEdges().removeClass('dim');
});

// mobile menu + legend toggles
function closeMenu(){document.body.classList.remove('menu-open');}
document.getElementById('menutoggle').onclick=()=>document.body.classList.toggle('menu-open');
document.getElementById('cluster').addEventListener('click',closeMenu);
document.getElementById('legBtn').onclick=()=>document.getElementById('legend').classList.toggle('show');
updateStat();
</script>
</body>
</html>
