<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golf Buddies — MciPro Revamp v1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Outfit:wght@100;200;300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<style>
  :root{
    --bg:#07090C;
    --glass:rgba(255,255,255,.045); --glass2:rgba(255,255,255,.07);
    --stroke-hi:rgba(255,255,255,.22); --stroke-lo:rgba(255,255,255,.05);
    --text:#F4F7F9; --sub:#8C96A1; --faint:#59636E;
    --green:#22c55e; --green-hi:#4ade80; --green-deep:#15803d;
    --green-dim:rgba(34,197,94,.15);
    --amber:#f0a531; --amber-dim:rgba(240,165,49,.13);
    --red:#f87171; --red-dim:rgba(248,113,113,.14);
    --ring-track:rgba(255,255,255,.08);
    --contour:rgba(34,197,94,.065);
    --sheet:#0B0F14;
  }
  body.theme-light{
    --bg:#EAEEF1;
    --glass:rgba(255,255,255,.62); --glass2:rgba(255,255,255,.9);
    --stroke-hi:rgba(255,255,255,.95); --stroke-lo:rgba(15,23,42,.08);
    --text:#0F141A; --sub:#5A6672; --faint:#98A3AE;
    --green:#16a34a; --green-hi:#22c55e; --green-deep:#15803d;
    --green-dim:rgba(22,163,74,.13);
    --amber:#d97706; --amber-dim:rgba(217,119,6,.1);
    --red:#dc2626; --red-dim:rgba(220,38,38,.1);
    --ring-track:rgba(15,23,42,.09);
    --contour:rgba(22,163,74,.09);
    --sheet:#F4F7F9;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
  html,body{scrollbar-width:none}
  ::-webkit-scrollbar{width:0;height:0}
  .micon{font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;display:inline-block;line-height:1;white-space:nowrap;direction:ltr;font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24}
  body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;position:relative;overflow-x:hidden}

  .atmo{position:fixed;inset:0;z-index:0;pointer-events:none}
  .atmo .glow1{position:absolute;top:-160px;left:50%;transform:translateX(-50%);width:560px;height:440px;
    background:radial-gradient(50% 50% at 50% 50%, rgba(34,197,94,.13), transparent 70%);filter:blur(10px)}
  .atmo svg{position:absolute;inset:0;width:100%;height:100%}
  .atmo path{fill:none;stroke:var(--contour);stroke-width:1.1}

  /* ===== modal sheet ===== */
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);z-index:1}
  body.theme-light .backdrop{background:rgba(15,23,42,.28)}
  .sheet{position:relative;z-index:2;max-width:440px;margin:0 auto;min-height:100vh;
    background:var(--sheet);display:flex;flex-direction:column;overflow:hidden}
  @media(min-width:520px){
    .sheet{margin:28px auto;min-height:0;max-height:calc(100vh - 56px);border-radius:26px;
      box-shadow:0 40px 90px rgba(0,0,0,.5)}
    .sheet::before{content:'';position:absolute;inset:0;border-radius:26px;padding:1px;
      background:linear-gradient(160deg,var(--stroke-hi),var(--stroke-lo) 40%,rgba(34,197,94,.16));
      -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;z-index:5}
  }

  /* ===== header ===== */
  .hd{padding:20px 18px 0;position:relative;z-index:3}
  .hd-top{display:flex;align-items:flex-start;justify-content:space-between}
  .overline{font:600 10px/1 'JetBrains Mono';letter-spacing:.26em;color:var(--green-hi);text-transform:uppercase;margin-bottom:9px}
  h1{font:600 27px/1 'Instrument Sans';letter-spacing:-.02em}
  .hdr-actions{display:flex;gap:8px}
  .ghost-ic{width:36px;height:36px;border-radius:50%;color:var(--sub);display:flex;align-items:center;justify-content:center;background:var(--glass2);border:1px solid var(--stroke-lo)}
  .ghost-ic .micon{font-size:18px}

  /* segmented */
  .seg{display:flex;padding:4px;gap:4px;margin:16px 0 4px;border-radius:16px;background:var(--glass);position:relative}
  .seg::before{content:'';position:absolute;inset:0;border-radius:16px;padding:1px;
    background:linear-gradient(160deg,var(--stroke-hi),var(--stroke-lo) 60%);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
  .seg button{flex:1;border:0;background:transparent;color:var(--sub);font:600 12.5px/1 'Instrument Sans';padding:11px 0;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer}
  .seg button .micon{font-size:16px}
  .seg button .ct{font:600 10px/1 'JetBrains Mono';opacity:.7}
  .seg button.on{background:var(--glass2);color:var(--text);box-shadow:inset 0 0 0 1px var(--stroke-lo), 0 2px 8px rgba(0,0,0,.18)}
  body.theme-light .seg button.on{box-shadow:inset 0 0 0 1px var(--stroke-lo), 0 2px 8px rgba(15,23,42,.08)}
  .seg button.on .micon{color:var(--green-hi)}

  /* ===== body scroll ===== */
  .body{flex:1;overflow-y:auto;padding:14px 18px 24px;position:relative;z-index:3}
  .tabpane{display:none}
  .tabpane.on{display:block;animation:fade .22s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  /* ===== toolbar band ===== */
  .toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
  .count-k{font:600 11px/1.3 'JetBrains Mono';letter-spacing:.06em;color:var(--sub)}
  .count-k b{color:var(--text)}
  .mini-seg{display:flex;background:var(--glass2);border-radius:11px;padding:3px;gap:2px;flex:none;border:1px solid var(--stroke-lo)}
  .mini-seg span{font:600 11px/1 'Instrument Sans';color:var(--sub);padding:7px 9px;border-radius:8px;cursor:pointer}
  .mini-seg span.on{background:var(--green);color:#fff}
  .edit-btn{font:600 12.5px/1 'Instrument Sans';color:var(--green-hi);background:none;border:0;cursor:pointer;padding:6px 4px}

  /* ===== glass list group ===== */
  .group{border-radius:20px;overflow:hidden;background:var(--glass);position:relative}
  .group::before{content:'';position:absolute;inset:0;border-radius:20px;padding:1px;
    background:linear-gradient(160deg,var(--stroke-hi),var(--stroke-lo) 45%);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;z-index:1}

  /* buddy row */
  .brow{display:flex;align-items:center;gap:12px;padding:12px 14px;position:relative}
  .brow + .brow::after{content:'';position:absolute;top:0;left:64px;right:14px;height:1px;background:var(--stroke-lo)}
  .av{width:44px;height:44px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;
    font:600 16px/1 'Instrument Sans';color:#fff;background:linear-gradient(135deg,#34d399,#3b82f6);box-shadow:0 2px 8px rgba(0,0,0,.2)}
  .c1{background:linear-gradient(135deg,#34d399,#0ea5e9)}
  .c2{background:linear-gradient(135deg,#22c55e,#4f46e5)}
  .c3{background:linear-gradient(135deg,#14b8a6,#3b82f6)}
  .c4{background:linear-gradient(135deg,#10b981,#6366f1)}
  .c5{background:linear-gradient(135deg,#059669,#2563eb)}
  .brow .info{flex:1;min-width:0}
  .brow .nm{font:600 15.5px/1.2 'Instrument Sans';white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brow .meta{display:flex;align-items:center;gap:7px;margin-top:4px;font:500 11.5px/1 'JetBrains Mono';color:var(--sub);letter-spacing:.02em}
  .brow .meta .hcp{color:var(--green-hi);font-weight:600}
  .brow .meta .dot{width:3px;height:3px;border-radius:50%;background:var(--faint);flex:none}
  .brow .meta .played{color:var(--text)}
  /* trailing actions */
  .act{display:flex;align-items:center;gap:8px;flex:none}
  .round-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 13px;border-radius:11px;cursor:pointer;
    font:600 12.5px/1 'Instrument Sans';background:var(--glass2);border:1px solid var(--stroke-lo);color:var(--text)}
  .round-btn .micon{font-size:15px;color:var(--green-hi)}
  .round-btn.live{background:var(--green);border-color:transparent;color:#fff}
  .round-btn.live .micon{color:#fff}
  .icon-btn{width:38px;height:38px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;
    background:var(--glass2);border:1px solid var(--stroke-lo);color:var(--sub);cursor:pointer}
  .icon-btn .micon{font-size:18px}
  .icon-btn.danger{background:var(--red-dim);border-color:transparent;color:var(--red)}
  /* edit mode reveals remove, hides round */
  .remove-cell{display:none}
  .body.editing .round-btn{display:none}
  .body.editing .remove-cell{display:flex}

  /* ===== groups tab ===== */
  .new-group{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:16px;cursor:pointer;
    background:var(--green);color:#fff;border:0;font:600 14px/1 'Instrument Sans';box-shadow:0 6px 18px rgba(34,197,94,.28);margin-bottom:14px}
  .new-group .micon{font-size:19px}
  .gcard{border-radius:20px;background:var(--glass);position:relative;padding:16px 16px 14px;margin-bottom:12px}
  .gcard::before{content:'';position:absolute;inset:0;border-radius:20px;padding:1px;
    background:linear-gradient(160deg,var(--stroke-hi),var(--stroke-lo) 45%);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
  .gcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .gcard .gname{font:600 17px/1.15 'Instrument Sans';letter-spacing:-.01em}
  .gcard .gsub{font:500 11px/1 'JetBrains Mono';letter-spacing:.05em;color:var(--sub);margin-top:6px}
  .gtile{width:40px;height:40px;border-radius:13px;flex:none;display:flex;align-items:center;justify-content:center;background:var(--green-dim);box-shadow:0 0 12px rgba(34,197,94,.10)}
  .gtile .micon{font-size:22px;color:var(--green-hi)}
  .avs{display:flex;align-items:center;margin:14px 0 4px}
  .avs .sm{width:30px;height:30px;border-radius:50%;border:2px solid var(--sheet);margin-left:-8px;display:flex;align-items:center;justify-content:center;font:600 10px/1 'Instrument Sans';color:#fff}
  .avs .sm:first-child{margin-left:0}
  .avs .more{background:var(--glass2);color:var(--sub);border:2px solid var(--sheet);font-size:10px}
  .gactions{display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--stroke-lo)}
  .gbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:11px 0;border-radius:12px;cursor:pointer;
    font:600 13px/1 'Instrument Sans';background:var(--glass2);border:1px solid var(--stroke-lo);color:var(--text)}
  .gbtn .micon{font-size:16px}
  .gbtn.primary{background:var(--green);border-color:transparent;color:#fff;flex:1.4}
  .gbtn.primary .micon{color:#fff}
  .gbtn.mut{flex:none;width:46px;color:var(--sub)}

  /* ===== discover tab ===== */
  .search{position:relative;margin-bottom:16px}
  .search .micon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:19px;color:var(--faint)}
  .search input{width:100%;padding:13px 14px 13px 42px;border-radius:14px;border:1px solid var(--stroke-lo);
    background:var(--glass2);color:var(--text);font:500 14.5px/1 'Instrument Sans';outline:none}
  .search input::placeholder{color:var(--faint)}
  .sec-title{font:600 10px/1 'JetBrains Mono';letter-spacing:.18em;text-transform:uppercase;color:var(--faint);margin:4px 6px 10px;display:flex;align-items:center;gap:7px}
  .sec-title .micon{font-size:14px;color:var(--green-hi)}
  .add-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:11px;cursor:pointer;
    font:600 12.5px/1 'Instrument Sans';background:var(--green);border:0;color:#fff;flex:none;box-shadow:0 4px 12px rgba(34,197,94,.24)}
  .add-btn .micon{font-size:16px}
  .add-btn.done{background:var(--glass2);color:var(--sub);box-shadow:none;border:1px solid var(--stroke-lo)}

  /* empty state */
  .empty{text-align:center;padding:46px 20px}
  .empty .ei{width:64px;height:64px;border-radius:20px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;background:var(--glass2);border:1px solid var(--stroke-lo)}
  .empty .ei .micon{font-size:30px;color:var(--faint)}
  .empty p{font:500 14px/1.4 'Instrument Sans';color:var(--sub)}
  .empty .sm{font:500 12px/1.4 'Instrument Sans';color:var(--faint);margin-top:6px}

  /* round-active banner */
  .live-banner{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:14px;margin-bottom:12px;
    background:var(--green-dim);border:1px solid rgba(34,197,94,.3)}
  .live-banner .micon{font-size:18px;color:var(--green-hi)}
  .live-banner .t{font:600 12.5px/1.3 'Instrument Sans';color:var(--text)}
  .live-banner .t small{display:block;font:500 11px/1.3 'JetBrains Mono';color:var(--sub);margin-top:2px}
</style>
</head>
<body>
<div class="atmo">
  <div class="glow1"></div>
  <svg viewBox="0 0 440 900" preserveAspectRatio="xMidYMid slice">
    <path d="M-40 180 Q160 120 440 220"/><path d="M-40 260 Q180 210 460 300"/>
    <path d="M-40 620 Q200 560 470 660"/><path d="M-40 720 Q160 690 460 760"/>
  </svg>
</div>

<div class="backdrop"></div>

<div class="sheet">
  <!-- HEADER -->
  <div class="hd">
    <div class="hd-top">
      <div>
        <div class="overline">My Golf Crew</div>
        <h1>Golf Buddies</h1>
      </div>
      <div class="hdr-actions">
        <button class="ghost-ic" onclick="toggleTheme()" title="Theme"><span class="micon">contrast</span></button>
        <button class="ghost-ic" title="Close"><span class="micon">close</span></button>
      </div>
    </div>
    <!-- SEGMENTED TABS -->
    <div class="seg">
      <button class="on" onclick="tab('buddies',this)"><span class="micon">group</span>Buddies<span class="ct">15</span></button>
      <button onclick="tab('groups',this)"><span class="micon">groups_2</span>Groups<span class="ct">2</span></button>
      <button onclick="tab('discover',this)"><span class="micon">person_search</span>Discover</button>
    </div>
  </div>

  <!-- BODY -->
  <div class="body" id="body">

    <!-- ============ BUDDIES ============ -->
    <div class="tabpane on" id="pane-buddies">
      <div class="toolbar">
        <div class="count-k"><b>15</b> buddies</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="mini-seg">
            <span class="on">Played</span><span>Recent</span><span>A–Z</span>
          </div>
          <button class="edit-btn" onclick="toggleEdit()">Edit</button>
        </div>
      </div>

      <div class="group" id="buddyList"></div>
    </div>

    <!-- ============ GROUPS ============ -->
    <div class="tabpane" id="pane-groups">
      <button class="new-group"><span class="micon">add</span>New Group</button>

      <div class="gcard">
        <div class="gcard-top">
          <div>
            <div class="gname">Sunday Regulars</div>
            <div class="gsub">4 MEMBERS · LAST USED APR 28</div>
          </div>
          <div class="gtile"><span class="micon">flag</span></div>
        </div>
        <div class="avs">
          <div class="sm c1">P</div><div class="sm c2">T</div><div class="sm c3">A</div><div class="sm c4">J</div>
        </div>
        <div class="gactions">
          <button class="gbtn primary"><span class="micon">play_arrow</span>Load to round</button>
          <button class="gbtn"><span class="micon">edit</span>Edit</button>
          <button class="gbtn mut"><span class="micon">delete</span></button>
        </div>
      </div>

      <div class="gcard">
        <div class="gcard-top">
          <div>
            <div class="gname">Work Crew</div>
            <div class="gsub">3 MEMBERS · LAST USED MAR 12</div>
          </div>
          <div class="gtile"><span class="micon">flag</span></div>
        </div>
        <div class="avs">
          <div class="sm c5">B</div><div class="sm c2">E</div><div class="sm c3">D</div>
        </div>
        <div class="gactions">
          <button class="gbtn primary"><span class="micon">play_arrow</span>Load to round</button>
          <button class="gbtn"><span class="micon">edit</span>Edit</button>
          <button class="gbtn mut"><span class="micon">delete</span></button>
        </div>
      </div>
    </div>

    <!-- ============ DISCOVER ============ -->
    <div class="tabpane" id="pane-discover">
      <div class="search">
        <span class="micon">search</span>
        <input type="text" placeholder="Search players by name…">
      </div>

      <div class="sec-title"><span class="micon">auto_awesome</span>Suggested from your rounds</div>
      <div class="group" id="suggestList"></div>
    </div>

  </div>
</div>

<script>
  // sample data — mirrors Pete's screenshot + filled to 15
  const buddies = [
    {n:'See-Hoe, Perry', h:'2.6', x:11, last:"Apr '25", c:'c1'},
    {n:'Gilbert, Tristan', h:'12.0', x:10, last:"Apr '25", c:'c2'},
    {n:'Alan Thomas', h:'8.5', x:6, last:"Mar '25", c:'c3'},
    {n:'Jason Kang', h:'5.0', x:5, last:"Mar '25", c:'c4'},
    {n:'Billy Shepley', h:'5.3', x:4, last:"Feb '25", c:'c5'},
    {n:'Erik Lundman', h:'14.2', x:4, last:"Feb '25", c:'c1'},
    {n:'Derek Thorogood', h:'9.1', x:3, last:"Jan '25", c:'c2'},
    {n:'Somchai Prasert', h:'18.4', x:2, last:"Dec '24", c:'c3'},
  ];
  const suggestions = [
    {n:'Nigel Barker', h:'11.2', x:3, last:"May '25", c:'c4'},
    {n:'Kittipong S.', h:'7.8', x:2, last:"Apr '25", c:'c5'},
  ];

  function initial(name){ return name.replace(/,/,'').trim().charAt(0).toUpperCase(); }

  document.getElementById('buddyList').innerHTML = buddies.map(b=>`
    <div class="brow">
      <div class="av ${b.c}">${initial(b.n)}</div>
      <div class="info">
        <div class="nm">${b.n}</div>
        <div class="meta"><span class="hcp">HCP ${b.h}</span><span class="dot"></span><span class="played">${b.x} rounds</span><span class="dot"></span><span>${b.last}</span></div>
      </div>
      <div class="act">
        <button class="round-btn"><span class="micon">golf_course</span>To round</button>
        <button class="icon-btn danger remove-cell"><span class="micon">person_remove</span></button>
      </div>
    </div>`).join('');

  document.getElementById('suggestList').innerHTML = suggestions.map(b=>`
    <div class="brow">
      <div class="av ${b.c}">${initial(b.n)}</div>
      <div class="info">
        <div class="nm">${b.n}</div>
        <div class="meta"><span class="hcp">HCP ${b.h}</span><span class="dot"></span><span class="played">played ${b.x}x</span><span class="dot"></span><span>${b.last}</span></div>
      </div>
      <div class="act">
        <button class="add-btn"><span class="micon">person_add</span>Add</button>
      </div>
    </div>`).join('');

  function tab(name, el){
    document.querySelectorAll('.seg button').forEach(b=>b.classList.remove('on'));
    el.classList.add('on');
    document.querySelectorAll('.tabpane').forEach(p=>p.classList.remove('on'));
    document.getElementById('pane-'+name).classList.add('on');
  }
  function toggleEdit(){
    const body=document.getElementById('body'); const btn=event.target;
    body.classList.toggle('editing');
    btn.textContent = body.classList.contains('editing') ? 'Done' : 'Edit';
    btn.style.color = body.classList.contains('editing') ? 'var(--green-hi)' : 'var(--green-hi)';
  }
  function toggleTheme(){ document.body.classList.toggle('theme-light'); }
  if (location.search.includes('light')) document.body.classList.add('theme-light');
</script>
</body>
</html>
