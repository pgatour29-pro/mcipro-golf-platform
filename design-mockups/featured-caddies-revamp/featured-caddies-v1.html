<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Featured Caddies — FCV1 mockup</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&family=Outfit:wght@200;300;400&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#eef1f4; padding:12px; display:flex; justify-content:center; }
  .wrap { width:100%; max-width:400px; }
  body.desktop .wrap { max-width:1180px; }
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400; vertical-align:middle; }

  .fcv-scope{
    --fcv-sheet:#0B0F14; --fcv-glass:rgba(255,255,255,.045); --fcv-glass2:rgba(255,255,255,.07);
    --fcv-shi:rgba(255,255,255,.22); --fcv-slo:rgba(255,255,255,.06);
    --fcv-text:#F4F7F9; --fcv-sub:#8C96A1; --fcv-faint:#59636E;
    --fcv-green:#22c55e; --fcv-greenhi:#4ade80; --fcv-greendim:rgba(34,197,94,.15);
    --fcv-gold:#facc15;
    font-family:'Instrument Sans',-apple-system,sans-serif; -webkit-font-smoothing:antialiased;
    background:radial-gradient(120% 30% at 50% 0%, rgba(34,197,94,.07), transparent 60%), var(--fcv-sheet);
    color:var(--fcv-text); border-radius:22px; padding:16px 14px 14px;
  }
  body.light .fcv-scope{
    --fcv-sheet:#F4F7F9; --fcv-glass:rgba(255,255,255,.62); --fcv-glass2:rgba(255,255,255,.9);
    --fcv-shi:rgba(255,255,255,.95); --fcv-slo:rgba(15,23,42,.08);
    --fcv-text:#0F141A; --fcv-sub:#5A6672; --fcv-faint:#98A3AE;
    --fcv-green:#16a34a; --fcv-greenhi:#16a34a; --fcv-greendim:rgba(22,163,74,.13);
    --fcv-gold:#f59e0b;
    background:radial-gradient(120% 30% at 50% 0%, rgba(22,163,74,.05), transparent 60%), var(--fcv-sheet);
  }
  .fcv-sechead{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; padding:0 2px; }
  .fcv-overline{ font:600 10px/1 'JetBrains Mono',monospace; letter-spacing:.26em; color:var(--fcv-greenhi); text-transform:uppercase; display:flex; align-items:center; gap:7px; }
  .fcv-overline .material-symbols-outlined{ font-size:14px; }
  .fcv-seclink{ font:600 11px/1 'JetBrains Mono',monospace; letter-spacing:.08em; color:var(--fcv-sub); text-transform:uppercase; display:flex; align-items:center; gap:4px; background:none; border:none; cursor:pointer; padding:0; }
  .fcv-seclink .material-symbols-outlined{ font-size:14px; color:var(--fcv-greenhi); }

  .fcv-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  body.desktop .fcv-grid{ grid-template-columns:repeat(4,1fr); }
  .fcv-tile{ position:relative; border-radius:15px; background:var(--fcv-glass); padding:14px 8px 11px; text-align:center; cursor:pointer; overflow:hidden; }
  .fcv-tile::before{ content:''; position:absolute; inset:0; border-radius:15px; padding:1px;
    background:linear-gradient(160deg,var(--fcv-shi),var(--fcv-slo) 55%);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0); -webkit-mask-composite:xor; mask-composite:exclude; pointer-events:none; }
  .fcv-avwrap{ position:relative; width:56px; height:56px; margin:0 auto 8px; }
  .fcv-av{ width:56px; height:56px; border-radius:50%; object-fit:cover; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#15803d,#22c55e); color:#fff; font:600 17px/1 'Instrument Sans',sans-serif;
    box-shadow:0 0 0 2px var(--fcv-sheet), 0 0 0 3.5px var(--fcv-green), 0 4px 14px rgba(34,197,94,.25); }
  img.fcv-av{ display:block; }
  .fcv-rate{ position:absolute; bottom:-4px; left:50%; transform:translateX(-50%); height:15px; padding:0 6px; border-radius:8px;
    background:var(--fcv-gold); color:#1c1400; font:800 8.5px/15px 'JetBrains Mono',monospace; letter-spacing:.04em;
    border:1px solid rgba(0,0,0,.3); box-shadow:0 1px 3px rgba(0,0,0,.4); white-space:nowrap; }
  .fcv-name{ font:600 13.5px/1.15 'Instrument Sans',sans-serif; color:var(--fcv-text); margin-top:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .fcv-course{ font:500 9px/1.3 'JetBrains Mono',monospace; letter-spacing:.05em; color:var(--fcv-faint); text-transform:uppercase; margin-top:4px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .fcv-chip{ display:inline-flex; align-items:center; gap:4px; margin-top:7px; font:700 8.5px/1 'JetBrains Mono',monospace; letter-spacing:.1em;
    padding:4px 7px; border-radius:7px; background:var(--fcv-greendim); color:var(--fcv-greenhi); text-transform:uppercase; }
  .fcv-chip .dot{ width:5px; height:5px; border-radius:50%; background:var(--fcv-greenhi); }
</style>
</head>
<body>
<div class="wrap">
  <div class="fcv-scope">
    <div class="fcv-sechead">
      <div class="fcv-overline"><span class="material-symbols-outlined">sports</span>FEATURED CADDIES</div>
      <button class="fcv-seclink">BOOK CADDY <span class="material-symbols-outlined">arrow_forward</span></button>
    </div>
    <div class="fcv-grid">
      <div class="fcv-tile">
        <div class="fcv-avwrap"><div class="fcv-av">NP</div><span class="fcv-rate">★ 4.9</span></div>
        <div class="fcv-name">Noi P.</div>
        <div class="fcv-course">GREENWOOD GOLF</div>
        <span class="fcv-chip"><span class="dot"></span>AVAILABLE</span>
      </div>
      <div class="fcv-tile">
        <div class="fcv-avwrap"><div class="fcv-av" style="background:linear-gradient(135deg,#0e7490,#22d3ee);">SM</div><span class="fcv-rate">★ 4.8</span></div>
        <div class="fcv-name">Som M.</div>
        <div class="fcv-course">EASTERN STAR</div>
        <span class="fcv-chip"><span class="dot"></span>AVAILABLE</span>
      </div>
      <div class="fcv-tile">
        <div class="fcv-avwrap"><div class="fcv-av" style="background:linear-gradient(135deg,#a16207,#facc15);color:#1c1400;">LK</div><span class="fcv-rate">★ 4.8</span></div>
        <div class="fcv-name">Lek K.</div>
        <div class="fcv-course">PATTAYA CC</div>
        <span class="fcv-chip"><span class="dot"></span>AVAILABLE</span>
      </div>
      <div class="fcv-tile">
        <div class="fcv-avwrap"><div class="fcv-av" style="background:linear-gradient(135deg,#7c2d12,#fb923c);">JD</div><span class="fcv-rate">★ 4.7</span></div>
        <div class="fcv-name">Jib D.</div>
        <div class="fcv-course">GREENWOOD GOLF</div>
        <span class="fcv-chip"><span class="dot"></span>AVAILABLE</span>
      </div>
    </div>
  </div>
</div>
<script>
  const q = new URLSearchParams(location.search);
  if (q.has('light')) document.body.classList.add('light');
  if (q.has('desktop')) document.body.classList.add('desktop');
</script>
</body>
</html>
