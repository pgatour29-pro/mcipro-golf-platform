<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>FCV1 harness</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>body{background:#eef1f4;padding:12px;display:flex;justify-content:center}.wrap{width:100%;max-width:400px}body.desktop .wrap{max-width:1180px}.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400;vertical-align:middle}</style>
</head><body><div class="wrap">                <!-- Featured Caddies — FCV1 (approved mockup 2026-07-10, design-mockups/featured-caddies-revamp).
                     Overview canvas is ALWAYS light — this section paints its own sheet like gdbV1/mkpV1. -->
                <style id="fcV1Style">
                  .fcv-scope{
                    --fcv-sheet:#0B0F14; --fcv-glass:rgba(255,255,255,.045); --fcv-glass2:rgba(255,255,255,.07);
                    --fcv-shi:rgba(255,255,255,.22); --fcv-slo:rgba(255,255,255,.06);
                    --fcv-text:#F4F7F9; --fcv-sub:#8C96A1; --fcv-faint:#59636E;
                    --fcv-green:#22c55e; --fcv-greenhi:#4ade80; --fcv-greendim:rgba(34,197,94,.15);
                    --fcv-gold:#facc15;
                    font-family:'Instrument Sans',-apple-system,sans-serif; -webkit-font-smoothing:antialiased;
                    background:radial-gradient(120% 30% at 50% 0%, rgba(34,197,94,.07), transparent 60%), var(--fcv-sheet);
                    color:var(--fcv-text); border-radius:22px; padding:16px 14px 14px;
                  }
                  body.theme-light .fcv-scope{
                    --fcv-sheet:#F4F7F9; --fcv-glass:rgba(255,255,255,.62); --fcv-glass2:rgba(255,255,255,.9);
                    --fcv-shi:rgba(255,255,255,.95); --fcv-slo:rgba(15,23,42,.08);
                    --fcv-text:#0F141A; --fcv-sub:#5A6672; --fcv-faint:#98A3AE;
                    --fcv-green:#16a34a; --fcv-greenhi:#16a34a; --fcv-greendim:rgba(22,163,74,.13);
                    --fcv-gold:#f59e0b;
                    background:radial-gradient(120% 30% at 50% 0%, rgba(22,163,74,.05), transparent 60%), var(--fcv-sheet);
                  }
                  .fcv-scope .fcv-sechead{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; padding:0 2px; }
                  .fcv-scope .fcv-overline{ font:600 10px/1 'JetBrains Mono',monospace; letter-spacing:.26em; color:var(--fcv-greenhi); text-transform:uppercase; display:flex; align-items:center; gap:7px; }
                  .fcv-scope .fcv-overline .material-symbols-outlined{ font-size:14px; }
                  .fcv-scope .fcv-seclink{ font:600 11px/1 'JetBrains Mono',monospace; letter-spacing:.08em; color:var(--fcv-sub); text-transform:uppercase; display:flex; align-items:center; gap:4px; background:none; border:none; cursor:pointer; padding:0; }
                  .fcv-scope .fcv-seclink .material-symbols-outlined{ font-size:14px; color:var(--fcv-greenhi); }
                  .fcv-scope .fcv-tile{ position:relative; border-radius:15px; background:var(--fcv-glass); padding:14px 8px 11px; text-align:center; cursor:pointer; overflow:hidden; }
                  .fcv-scope .fcv-tile::before{ content:''; position:absolute; inset:0; border-radius:15px; padding:1px;
                    background:linear-gradient(160deg,var(--fcv-shi),var(--fcv-slo) 55%);
                    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0); -webkit-mask-composite:xor; mask-composite:exclude; pointer-events:none; }
                  .fcv-scope .fcv-avwrap{ position:relative; width:56px; height:56px; margin:0 auto 8px; }
                  .fcv-scope .fcv-av{ width:56px; height:56px; border-radius:50%; object-fit:cover; display:flex; align-items:center; justify-content:center;
                    background:linear-gradient(135deg,#15803d,#22c55e); color:#fff; font:600 17px/1 'Instrument Sans',sans-serif;
                    box-shadow:0 0 0 2px var(--fcv-sheet), 0 0 0 3.5px var(--fcv-green), 0 4px 14px rgba(34,197,94,.25); }
                  .fcv-scope img.fcv-avimg{ position:absolute; inset:0; display:block; }
                  .fcv-scope .fcv-rate{ position:absolute; bottom:-4px; left:50%; transform:translateX(-50%); height:15px; padding:0 6px; border-radius:8px;
                    background:var(--fcv-gold); color:#1c1400; font:800 8.5px/15px 'JetBrains Mono',monospace; letter-spacing:.04em;
                    border:1px solid rgba(0,0,0,.3); box-shadow:0 1px 3px rgba(0,0,0,.4); white-space:nowrap; z-index:1; }
                  .fcv-scope .fcv-name{ font:600 13.5px/1.15 'Instrument Sans',sans-serif; color:var(--fcv-text); margin-top:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
                  .fcv-scope .fcv-course{ font:500 9px/1.3 'JetBrains Mono',monospace; letter-spacing:.05em; color:var(--fcv-faint); text-transform:uppercase; margin-top:4px;
                    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
                  .fcv-scope .fcv-chip{ display:inline-flex; align-items:center; gap:4px; margin-top:7px; font:700 8.5px/1 'JetBrains Mono',monospace; letter-spacing:.1em;
                    padding:4px 7px; border-radius:7px; background:var(--fcv-greendim); color:var(--fcv-greenhi); text-transform:uppercase; }
                  .fcv-scope .fcv-chip .dot{ width:5px; height:5px; border-radius:50%; background:var(--fcv-greenhi); }
                  .fcv-scope .fcv-chip.ghost{ background:var(--fcv-glass2); color:var(--fcv-sub); box-shadow:inset 0 0 0 1px var(--fcv-slo); }
                  .fcv-scope .fcv-chip.ghost .dot{ background:var(--fcv-sub); }
                  .fcv-scope .fcv-loading{ grid-column:1/-1; text-align:center; padding:16px; color:var(--fcv-faint); font:500 12px/1 'Instrument Sans',sans-serif; }
                </style>
                <div class="fcv-scope mb-4 md:mb-8 light-hide">
                    <div class="fcv-sechead">
                        <div class="fcv-overline"><span class="material-symbols-outlined">sports</span>FEATURED CADDIES</div>
                        <button onclick="showGolferTab('caddies', event)" class="fcv-seclink">BOOK CADDY <span class="material-symbols-outlined">arrow_forward</span></button>
                    </div>

                    <!-- Mobile: 2x2 compact grid -->
                    <div class="block md:hidden">
                        <div id="promotionalCaddysContainer" class="grid grid-cols-2 gap-2">
                            <!-- Promotional caddies will be loaded here for mobile -->
                        </div>
                    </div>

                    <!-- Desktop: Grid layout -->
                    <div class="hidden md:grid md:grid-cols-4 gap-3" id="promotionalCaddysDesktop">
                        <!-- Promotional caddies will be loaded here for desktop -->
                    </div>
</div>
<script>
const FIX = [
 { id:'c1', name:'Noi Prasert', photo_url:'', course_name:'Greenwood Golf & Resort', rating:4.9, availability_status:'available' },
 { id:'c2', name:'Som Malee', photo_url:'https://invalid.example/broken.jpg', course_name:'Eastern Star Golf Course', rating:4.8, availability_status:'available' },
 { id:'c3', name:'Caddy #16', photo_url:'', course_name:'Greenwood Golf & Resort', rating:4.5, availability_status:'busy' },
 { id:'c4', name:'Jib Duang', photo_url:'', course_name:'Pattaya CC', rating:4.7, availability_status:'available' }
];
window.SupabaseDB = { client: { from: () => { const c = { select:()=>c, eq:()=>c, order:()=>c, limit:()=>c, then:(a,b)=>Promise.resolve({data:FIX,error:null}).then(a,b) }; return c; } } };
window.NotificationManager = { show: m=>console.log('[n]',m) };
window.micon = n=>'<span class="material-symbols-outlined">'+n+'</span>';
window.showGolferTab = ()=>{};
</script>
<script>        let _featuredCaddiesData = [];

        function showFeaturedCaddyProfile(caddyId) {
            const caddie = _featuredCaddiesData.find(c => c.id === caddyId);
            if (!caddie) { NotificationManager.show('Caddy not found', 'error'); return; }

            // Open Model 2 with this caddie's course, then show their profile
            if (typeof GolferCaddyBooking !== 'undefined') {
                GolferCaddyBooking.showCaddyBookingPage(caddie.course_name).then(() => {
                    setTimeout(() => {
                        // Find this caddie in the loaded list by matching the real UUID
                        if (GolferCaddyBooking.viewCaddyProfile) {
                            GolferCaddyBooking.viewCaddyProfile(caddyId);
                        }
                    }, 600);
                });
            }
        }

        async function loadPromotionalCaddys() {
            // Fetch top-rated caddies from real database
            let promotionalCaddys = [];
            try {
                const { data, error } = await window.SupabaseDB.client
                    .from('caddy_profiles')
                    .select('id, name, photo_url, course_name, experience_years, languages, rating, total_reviews, specialties, availability_status')
                    .eq('is_active', true)
                    .order('rating', { ascending: false })
                    .limit(8);

                if (!error && data && data.length > 0) {
                    // Prefer caddies with a real photo and a real name (not 'Caddy #N'
                    // placeholders) — Pete 2026-07-10: the old pure-rating shuffle kept
                    // surfacing photo-less placeholder rows
                    const quality = c => (c.photo_url ? 2 : 0) + (/^caddy #/i.test(c.name || '') ? 0 : 1);
                    const pool = [...data].sort((a, b) => quality(b) - quality(a) || (b.rating || 0) - (a.rating || 0)).slice(0, 12);
                    const shuffled = [...pool].sort(() => 0.5 - Math.random());
                    promotionalCaddys = shuffled.slice(0, 4);
                    _featuredCaddiesData = promotionalCaddys;
                }
            } catch (e) {
                console.warn('[Featured Caddies] DB fetch failed, using demo data', e);
            }

            // Fallback to demo data if DB empty
            if (promotionalCaddys.length === 0) {
                const demoCaddys = CaddySystem.getRandomPromotionalCaddys(4);
                promotionalCaddys = demoCaddys.map(c => ({
                    id: c.id,
                    name: c.name,
                    photo_url: c.photo,
                    course_name: c.promotedCourse?.name || '',
                    experience_years: c.experience,
                    languages: c.languages,
                    rating: c.rating,
                    total_reviews: c.reviews,
                    specialties: [c.specialty],
                    availability_status: c.availability
                }));
                _featuredCaddiesData = promotionalCaddys;
            }
            const mobileContainer = document.getElementById('promotionalCaddysContainer');
            const desktopContainer = document.getElementById('promotionalCaddysDesktop');

            // FCV1 tile (approved mockup 2026-07-10) — one template for mobile + desktop.
            // Photo renders OVER an initials avatar; a broken photo just removes itself,
            // so nobody gets the old stock-photo stranger fallback.
            const fcvEsc = s => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
            const FCV_GRADS = [
                'linear-gradient(135deg,#15803d,#22c55e)',
                'linear-gradient(135deg,#0e7490,#22d3ee)',
                'linear-gradient(135deg,#a16207,#facc15)',
                'linear-gradient(135deg,#7c2d12,#fb923c)'
            ];
            const generateCaddyCard = (caddie, idx = 0) => {
                const initials = (caddie.name || '?').trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase();
                const grad = FCV_GRADS[idx % FCV_GRADS.length];
                const textColor = idx % FCV_GRADS.length === 2 ? ';color:#1c1400' : '';
                const rating = Number(caddie.rating || 4.5).toFixed(1);
                const status = String(caddie.availability_status || 'available').toLowerCase();
                const chip = status === 'available'
                    ? '<span class="fcv-chip"><span class="dot"></span>AVAILABLE</span>'
                    : `<span class="fcv-chip ghost"><span class="dot"></span>${fcvEsc(status.toUpperCase())}</span>`;
                return `
                <div class="fcv-tile" onclick="showFeaturedCaddyProfile('${caddie.id}')">
                    <div class="fcv-avwrap">
                        <div class="fcv-av" style="background:${grad}${textColor}">${fcvEsc(initials)}</div>
                        ${caddie.photo_url ? `<img class="fcv-av fcv-avimg" src="${fcvEsc(caddie.photo_url)}" alt="" loading="lazy" onerror="this.remove()">` : ''}
                        <span class="fcv-rate">★ ${rating}</span>
                    </div>
                    <div class="fcv-name">${fcvEsc(caddie.name)}</div>
                    <div class="fcv-course">${fcvEsc(caddie.course_name || '')}</div>
                    ${chip}
                </div>`;
            };

            const tilesHTML = promotionalCaddys.map((caddie, idx) => generateCaddyCard(caddie, idx)).join('');
            if (mobileContainer) mobileContainer.innerHTML = tilesHTML;
            if (desktopContainer) desktopContainer.innerHTML = tilesHTML;
        }


const q = new URLSearchParams(location.search);
if (q.has('light')) document.body.classList.add('theme-light');
if (q.has('desktop')) document.body.classList.add('desktop');
loadPromotionalCaddys();
</script></body></html>
