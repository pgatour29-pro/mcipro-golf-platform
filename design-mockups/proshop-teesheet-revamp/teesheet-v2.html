<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tee Sheet — Revamp Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root[data-theme="dark"]{
  --board:#0a0e17; --board-2:#0c111c;
  --panel:rgba(17,23,35,.82); --panel-solid:#111725;
  --grid:#0b1018; --card:#151d2e; --card-hi:#1b2439;
  --line:rgba(255,255,255,.06); --line-2:rgba(255,255,255,.11);
  --ink:#eef2f9; --ink-2:#aab6cc; --muted:#7b88a1; --faint:#4f5a72;
  --brand:#22c55e; --brand-ink:#052e13;
  --a:#34d399; --b:#38bdf8;            /* course accents */
  --reg:#22c55e; --vip:#f5b342; --soc:#38bdf8; --trn:#fb7185;
  --shadow:0 8px 24px -8px rgba(0,0,0,.55);
  --band-a:rgba(52,211,153,.045); --band-b:rgba(56,189,248,.05);
  --glow:0 0 0 1px rgba(34,197,94,.35), 0 0 22px -4px rgba(34,197,94,.45);
}
:root[data-theme="light"]{
  --board:#eef1f7; --board-2:#e9edf4;
  --panel:rgba(255,255,255,.9); --panel-solid:#ffffff;
  --grid:#ffffff; --card:#ffffff; --card-hi:#f7f9fc;
  --line:#e8ebf2; --line-2:#d5dbe6;
  --ink:#161c28; --ink-2:#414c60; --muted:#6c7789; --faint:#a7b0c0;
  --brand:#16a34a; --brand-ink:#ffffff;
  --a:#059669; --b:#0284c7;
  --reg:#16a34a; --vip:#d68a10; --soc:#0284c7; --trn:#e11d48;
  --shadow:0 6px 18px -8px rgba(24,39,75,.22);
  --band-a:rgba(5,150,105,.05); --band-b:rgba(2,132,199,.055);
  --glow:0 0 0 1px rgba(22,163,74,.28), 0 0 18px -6px rgba(22,163,74,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--board); color:var(--ink);
  -webkit-font-smoothing:antialiased; overflow:hidden;
  background-image:radial-gradient(120% 60% at 50% -10%, rgba(34,197,94,.06), transparent 60%);
}
.mono{font-family:'IBM Plex Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums}

.app{display:flex;flex-direction:column;height:100vh}

/* ============ COMMAND BAR ============ */
.cmd{
  display:flex;align-items:center;gap:18px;flex-shrink:0;
  padding:0 18px;height:56px;
  background:var(--panel);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line-2);
}
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.mark{
  width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex-shrink:0;
  background:linear-gradient(145deg,#22c55e,#15803d);
  box-shadow:0 4px 12px -3px rgba(34,197,94,.55),inset 0 1px 0 rgba(255,255,255,.35);
}
.mark svg{width:19px;height:19px;fill:#fff}
.course{display:flex;flex-direction:column;line-height:1.15;min-width:0}
.course b{font-size:15px;font-weight:700;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.course .sub{font-size:11px;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:6px}
.pin{display:inline-flex;align-items:center;gap:4px;padding:1px 7px;border-radius:20px;background:var(--card);border:1px solid var(--line-2);font-weight:600;color:var(--ink-2)}

.datebar{display:flex;align-items:center;gap:6px;margin-left:auto;margin-right:auto}
.navb{width:30px;height:30px;border-radius:9px;border:1px solid var(--line-2);background:var(--card);color:var(--ink-2);cursor:pointer;font-size:16px;display:grid;place-items:center;transition:.15s}
.navb:hover{background:var(--card-hi);color:var(--ink)}
.datepill{display:flex;flex-direction:column;align-items:center;line-height:1.1;padding:5px 20px;border-radius:11px;background:var(--card);border:1px solid var(--line-2);cursor:pointer}
.datepill .d{font-size:14px;font-weight:700;letter-spacing:-.2px}
.datepill .w{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.today{padding:5px 12px;border-radius:9px;font-size:12px;font-weight:700;border:1px solid var(--line-2);background:var(--card);color:var(--brand);cursor:pointer}

.cmd-right{display:flex;align-items:center;gap:10px}
.clock{display:flex;align-items:center;gap:9px}
.live{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:800;letter-spacing:1.3px;color:var(--brand)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 0 rgba(34,197,94,.6);animation:pulse 1.8s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}70%{box-shadow:0 0 0 7px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
.time{font-size:22px;font-weight:700;color:var(--ink);letter-spacing:.5px}
.time .s{font-size:14px;color:var(--muted)}
.iconbtn{width:34px;height:34px;border-radius:10px;border:1px solid var(--line-2);background:var(--card);color:var(--ink-2);cursor:pointer;display:grid;place-items:center;transition:.15s}
.iconbtn:hover{background:var(--card-hi);color:var(--ink)}
.iconbtn svg{width:17px;height:17px;fill:currentColor}
.dashbtn{display:flex;align-items:center;gap:7px;padding:0 15px;height:34px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:13px;background:linear-gradient(145deg,#22c55e,#16a34a);color:#fff;box-shadow:0 4px 12px -4px rgba(34,197,94,.6)}
.dashbtn svg{width:15px;height:15px;fill:#fff}

/* ============ TOOLBAR ============ */
.toolbar{
  display:flex;align-items:center;gap:14px;flex-shrink:0;flex-wrap:wrap;
  padding:11px 18px;background:var(--board-2);border-bottom:1px solid var(--line);
}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{display:flex;align-items:center;gap:8px;height:34px;padding:0 12px;border-radius:10px;background:var(--card);border:1px solid var(--line-2);cursor:pointer;transition:.15s}
.chip:hover{border-color:var(--muted)}
.chip .k{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted)}
.chip .v{font-size:13px;font-weight:700;color:var(--ink)}
.chip svg{width:13px;height:13px;fill:var(--muted)}
.search{display:flex;align-items:center;gap:8px;height:34px;padding:0 12px;border-radius:10px;background:var(--card);border:1px solid var(--line-2);min-width:190px}
.search svg{width:15px;height:15px;fill:var(--muted)}
.search input{border:none;background:none;outline:none;color:var(--ink);font-size:13px;font-family:inherit;width:100%}
.search input::placeholder{color:var(--faint)}

.kpis{display:flex;align-items:stretch;gap:0;margin-left:auto;background:var(--card);border:1px solid var(--line-2);border-radius:12px;overflow:hidden}
.kpi{display:flex;flex-direction:column;justify-content:center;padding:6px 16px;border-right:1px solid var(--line)}
.kpi:last-child{border-right:none}
.kpi .n{font-size:19px;font-weight:800;letter-spacing:-.5px;line-height:1;color:var(--ink)}
.kpi .n.g{color:var(--brand)}
.kpi .l{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin-top:3px}
.kpi.fill{min-width:118px}
.fillbar{height:5px;border-radius:4px;background:var(--line-2);margin-top:6px;overflow:hidden}
.fillbar>i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--brand),#4ade80)}

/* ============ LEGEND ============ */
.legend{display:flex;align-items:center;gap:16px;flex-shrink:0;padding:7px 18px;background:var(--board-2);border-bottom:1px solid var(--line)}
.lg{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--muted)}
.sw{width:11px;height:11px;border-radius:4px}
.legend .spacer{margin-left:auto;font-size:11px;color:var(--faint);font-weight:600}

/* ============ GRID ============ */
.scroll{flex:1;overflow:auto;position:relative;background:var(--grid)}
.grid{--rail:78px;--rowh:62px;min-width:900px}
.ghead{
  display:grid;grid-template-columns:var(--rail) repeat(4,1fr);
  position:sticky;top:0;z-index:20;background:var(--grid);
  box-shadow:0 1px 0 var(--line-2),0 6px 14px -10px rgba(0,0,0,.6);
}
.gh{padding:11px 14px 10px;border-right:1px solid var(--line);position:relative}
.gh:last-child{border-right:none}
.gh.timeh{display:flex;align-items:flex-end;justify-content:flex-start;font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)}
.gh.crs::before{content:"";position:absolute;top:0;left:14px;right:14px;height:3px;border-radius:0 0 3px 3px;background:var(--acc)}
.gh-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.gh-name{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:800;letter-spacing:-.2px}
.gh-name .badge{width:20px;height:20px;border-radius:6px;display:grid;place-items:center;font-size:11px;font-weight:800;color:#fff;background:var(--acc)}
.gh-count{font-size:12px;font-weight:700;color:var(--ink-2)}
.gh-count b{color:var(--acc)}
.gh-bar{height:4px;border-radius:3px;background:var(--line-2);margin-top:9px;overflow:hidden}
.gh-bar>i{display:block;height:100%;background:var(--acc);border-radius:3px}

.grow{display:grid;grid-template-columns:var(--rail) repeat(4,1fr);min-height:var(--rowh)}
.grow.past{opacity:.62}
.tcell{
  display:flex;flex-direction:column;align-items:flex-start;justify-content:center;
  padding:0 14px;border-right:1px solid var(--line-2);border-top:1px solid var(--line);
  position:sticky;left:0;background:var(--grid);z-index:5;
}
.grow.hour .tcell{border-top:1px solid var(--line-2)}
.tcell .t{font-size:14px;font-weight:600;letter-spacing:.3px;color:var(--ink-2)}
.grow.hour .tcell .t{font-weight:700;color:var(--ink);font-size:15px}
.tcell .tp{font-size:9px;color:var(--faint);font-weight:600;letter-spacing:.5px}

.cell{border-right:1px solid var(--line);border-top:1px solid var(--line);padding:6px;position:relative;transition:background .12s}
.cell:last-child{border-right:none}
.grow.hour .cell{border-top:1px solid var(--line-2)}
.cell.crs-a{background:var(--band-a)}
.cell.crs-b{background:var(--band-b)}
.cell.empty{cursor:pointer}
.cell.empty::after{
  content:"+ Add";position:absolute;inset:6px;border-radius:9px;
  display:grid;place-items:center;font-size:12px;font-weight:700;color:var(--faint);
  border:1.5px dashed transparent;opacity:0;transition:.14s;
}
.cell.empty:hover::after{opacity:1;border-color:var(--line-2);color:var(--muted);background:rgba(125,136,161,.06)}

/* ============ BOOKING CARD ============ */
.bk{
  position:relative;height:100%;min-height:50px;display:flex;align-items:center;gap:10px;
  padding:8px 11px 8px 13px;border-radius:11px;
  background:var(--card);border:1px solid var(--line-2);box-shadow:var(--shadow);
  cursor:grab;overflow:hidden;transition:transform .12s,box-shadow .12s,border-color .12s;
}
.bk::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--c)}
.bk:hover{transform:translateY(-2px);border-color:var(--c);box-shadow:0 12px 26px -10px rgba(0,0,0,.5)}
.av{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;display:grid;place-items:center;
  font-size:12px;font-weight:800;color:#fff;letter-spacing:.3px;
  background:linear-gradient(145deg,var(--c),color-mix(in srgb,var(--c) 55%,#000 22%));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.28);
}
.bk-body{min-width:0;flex:1}
.bk-name{font-size:13.5px;font-weight:700;letter-spacing:-.1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px}
.grp{font-size:10px;font-weight:800;color:var(--c);background:color-mix(in srgb,var(--c) 16%,transparent);padding:1px 6px;border-radius:20px;flex-shrink:0}
.bk-meta{display:flex;align-items:center;gap:9px;margin-top:3px;font-size:11px;color:var(--muted);font-weight:600}
.bk-meta .m{display:inline-flex;align-items:center;gap:3px}
.bk-meta svg{width:12px;height:12px;fill:currentColor;opacity:.85}
.tag{position:absolute;top:8px;right:10px;font-size:8.5px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;color:var(--c);background:color-mix(in srgb,var(--c) 15%,transparent);padding:2px 6px;border-radius:6px}
.paid{position:absolute;bottom:8px;right:10px;width:6px;height:6px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 3px color-mix(in srgb,var(--brand) 20%,transparent)}

/* ============ NOW LINE ============ */
.nowline{grid-column:1/-1;position:relative;height:0;z-index:12}
.nowline::before{content:"";position:absolute;left:var(--rail);right:0;top:0;height:2px;background:linear-gradient(90deg,var(--brand),rgba(34,197,94,.15));box-shadow:0 0 12px rgba(34,197,94,.5)}
.nowbadge{position:absolute;left:0;top:-11px;width:var(--rail);display:flex;justify-content:center}
.nowbadge span{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;color:#fff;background:var(--brand);padding:2px 8px;border-radius:20px;box-shadow:var(--glow)}
.nowdot{position:absolute;left:var(--rail);top:-4px;width:9px;height:9px;border-radius:50%;background:var(--brand);transform:translateX(-4px);box-shadow:var(--glow)}

@media (max-width:720px){
  .datebar{order:5;margin:0;width:100%}
  .cmd{flex-wrap:wrap;height:auto;padding:10px}
  .kpis{margin-left:0}
}
</style>
</head>
<body>
<div class="app">

  <!-- COMMAND BAR -->
  <div class="cmd">
    <div class="brand">
      <div class="mark"><svg viewBox="0 0 24 24"><path d="M6 2v20h2v-7l11-4.5L8 6V2H6z"/></svg></div>
      <div class="course">
        <b>Khao Kheow Country Club</b>
        <span class="sub"><span class="pin">18 · A / B</span> Pro Shop · Live Tee Sheet</span>
      </div>
    </div>

    <div class="datebar">
      <button class="navb">‹</button>
      <div class="datepill"><span class="w">Tuesday</span><span class="d">21 Jul 2026</span></div>
      <button class="navb">›</button>
      <button class="today">Today</button>
    </div>

    <div class="cmd-right">
      <div class="clock">
        <div class="live"><span class="dot"></span>LIVE</div>
        <div class="time mono">07:38<span class="s">:42</span></div>
      </div>
      <button class="iconbtn" id="themeBtn" title="Toggle theme"><svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36A5.4 5.4 0 0112 3z"/></svg></button>
      <button class="iconbtn" title="Settings"><svg viewBox="0 0 24 24"><path d="M12 8a4 4 0 100 8 4 4 0 000-8zm8.9 4l1.7 1.3-1.7 3-2-.6a7 7 0 01-1.5.9L17 20h-3.4l-.4-2.1a7 7 0 01-1.5-.9l-2 .6-1.7-3L9.7 13a7 7 0 010-1.9L8 9.8l1.7-3 2 .6a7 7 0 011.5-.9L13.6 4H17l.4 2.1a7 7 0 011.5.9l2-.6 1.7 3L20.9 12z"/></svg></button>
      <button class="dashbtn"><svg viewBox="0 0 24 24"><path d="M13 3l-2 0 0 8 8 0 0-2a6 6 0 00-6-6zm-2 10l-8 0a8 8 0 108-8z"/></svg>Dashboard</button>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="chips">
      <div class="chip"><span class="k">Layout</span><span class="v">18 · A/B</span><svg viewBox="0 0 12 12"><path d="M2 4l4 4 4-4z"/></svg></div>
      <div class="chip"><span class="k">Window</span><span class="v">06:00–18:00</span><svg viewBox="0 0 12 12"><path d="M2 4l4 4 4-4z"/></svg></div>
      <div class="chip"><span class="k">Interval</span><span class="v">8 min</span><svg viewBox="0 0 12 12"><path d="M2 4l4 4 4-4z"/></svg></div>
      <div class="chip"><span class="k">Tees</span><span class="v">2 / course</span><svg viewBox="0 0 12 12"><path d="M2 4l4 4 4-4z"/></svg></div>
      <div class="search"><svg viewBox="0 0 24 24"><path d="M10 4a6 6 0 104.47 10l4.27 4.26 1.41-1.41-4.26-4.27A6 6 0 0010 4zm0 2a4 4 0 110 8 4 4 0 010-8z"/></svg><input placeholder="Golfer or caddy…"></div>
    </div>

    <div class="kpis" id="kpis"></div>
  </div>

  <!-- LEGEND -->
  <div class="legend">
    <div class="lg"><span class="sw" style="background:var(--reg)"></span>Regular</div>
    <div class="lg"><span class="sw" style="background:var(--vip)"></span>VIP</div>
    <div class="lg"><span class="sw" style="background:var(--soc)"></span>Society</div>
    <div class="lg"><span class="sw" style="background:var(--trn)"></span>Tournament</div>
    <div class="spacer">Drag a booking to move · Click an open slot to add</div>
  </div>

  <!-- GRID -->
  <div class="scroll">
    <div class="grid" id="grid"></div>
  </div>
</div>

<script>
const TYPE={reg:{c:'var(--reg)',tag:''},vip:{c:'var(--vip)',tag:'VIP'},soc:{c:'var(--soc)',tag:''},trn:{c:'var(--trn)',tag:''}};
const COLS=[
  {k:'A1',name:'A-1',crs:'a',acc:'var(--a)'},
  {k:'A2',name:'A-2',crs:'a',acc:'var(--a)'},
  {k:'B1',name:'B-1',crs:'b',acc:'var(--b)'},
  {k:'B2',name:'B-2',crs:'b',acc:'var(--b)'},
];
function ini(n){return n.replace(/[^A-Za-z ]/g,'').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function bk(name,size,type,o={}){return {name,size,type,...o};}
const DATA={
  A1:{'06:00':bk('Somchai P.',4,'reg',{caddy:1,cart:1,paid:1}),'06:16':bk('Tanaka H.',2,'vip',{caddy:1,paid:1}),
      '06:48':bk('Wongse K.',4,'reg',{caddy:1,cart:1}),'07:04':bk('Miller J.',4,'soc',{tag:'TRGG',caddy:1,cart:1}),
      '07:36':bk('Park P.',4,'soc',{tag:'TRGG',caddy:1,cart:1}),'08:08':bk('Lee S.',3,'reg',{caddy:1})},
  A2:{'06:08':bk("O'Brien D.",3,'reg',{cart:1}),'06:40':bk('Chen W.',4,'vip',{caddy:1,cart:1,paid:1}),
      '06:56':bk('Anderson R.',4,'soc',{tag:'TRGG',caddy:1}),'07:12':bk('Bianchi L.',4,'soc',{tag:'TRGG',caddy:1}),
      '07:28':bk('Kowalski M.',4,'soc',{tag:'TRGG',caddy:1}),'08:00':bk('Nakamura T.',2,'reg',{})},
  B1:{'06:00':bk('Sato — Flight 1',4,'trn',{tag:'CLUB CH.',caddy:1}),'06:16':bk('Reyes — Flight 2',4,'trn',{tag:'CLUB CH.',caddy:1}),
      '06:32':bk('Novak — Flight 3',4,'trn',{tag:'CLUB CH.',caddy:1}),'06:48':bk('Haas — Flight 4',4,'trn',{tag:'CLUB CH.',caddy:1}),
      '07:04':bk('Ito — Flight 5',4,'trn',{tag:'CLUB CH.',caddy:1}),'07:44':bk('Marshall R.',2,'reg',{cart:1})},
  B2:{'06:24':bk('Green T.',2,'reg',{cart:1}),'07:20':bk('Silva M.',4,'vip',{caddy:1,cart:1,paid:1}),'08:16':bk('Dubois A.',3,'reg',{})},
};
const START=6*60, END=8*60+32, STEP=8, NOW=7*60+38;
const times=[];for(let m=START;m<=END;m+=STEP)times.push(m);
const fmt=m=>String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');

const SVG={cad:'<svg viewBox="0 0 24 24"><path d="M12 2a5 5 0 00-2 9.6V22l2-2 2 2V11.6A5 5 0 0012 2z"/></svg>',
  cart:'<svg viewBox="0 0 24 24"><path d="M4 4h3l1 3h11l-2 7H8L6 5H4V4zm4 14a2 2 0 100 4 2 2 0 000-4zm9 0a2 2 0 100 4 2 2 0 000-4z"/></svg>',
  ppl:'<svg viewBox="0 0 24 24"><path d="M16 11a4 4 0 10-4-4 4 4 0 004 4zm-8 0a3 3 0 10-3-3 3 3 0 003 3zm0 2c-2.7 0-5 1.3-5 3v2h6v-2c0-.9.4-1.7 1-2.4A7 7 0 008 13zm8 0c-3 0-6 1.5-6 3.5V19h12v-2.5C22 14.5 19 13 16 13z"/></svg>'};

// build KPIs
(function(){
  let booked=0,players=0;const slots=times.length*4;
  COLS.forEach(c=>{const d=DATA[c.k]||{};Object.values(d).forEach(b=>{booked++;players+=b.size;});});
  const fillPct=Math.round(booked/slots*100);
  document.getElementById('kpis').innerHTML=`
    <div class="kpi"><span class="n">${booked}</span><span class="l">Booked</span></div>
    <div class="kpi"><span class="n g">${slots-booked}</span><span class="l">Open</span></div>
    <div class="kpi"><span class="n">${players}</span><span class="l">Players</span></div>
    <div class="kpi fill"><span class="n">${fillPct}%</span><span class="l">Fill</span><div class="fillbar"><i style="width:${fillPct}%"></i></div></div>`;
})();

// build grid
const g=document.getElementById('grid');
let html='<div class="ghead"><div class="gh timeh">Time</div>';
COLS.forEach(c=>{
  const d=DATA[c.k]||{};const n=Object.keys(d).length;const pct=Math.round(n/times.length*100);
  html+=`<div class="gh crs" style="--acc:${c.acc}">
    <div class="gh-top"><div class="gh-name"><span class="badge">${c.name[0]}</span>${c.name}</div>
      <div class="gh-count"><b>${n}</b>/${times.length}</div></div>
    <div class="gh-bar"><i style="width:${pct}%"></i></div></div>`;
});
html+='</div>';

times.forEach((m,ri)=>{
  const hour=m%60===0;const past=m<NOW && (m+STEP)<=NOW;
  if(NOW>=m && NOW<m+STEP && ri>0){
    html+=`<div class="nowline"><div class="nowbadge"><span>${fmt(NOW)}</span></div><div class="nowdot"></div></div>`;
  }
  html+=`<div class="grow ${hour?'hour':''} ${past?'past':''}">`;
  html+=`<div class="tcell"><span class="t mono">${fmt(m)}</span>${hour?'<span class="tp">'+(m/60<12?'AM':'PM')+'</span>':''}</div>`;
  COLS.forEach(c=>{
    const b=(DATA[c.k]||{})[fmt(m)];
    if(!b){html+=`<div class="cell crs-${c.crs} empty"></div>`;return;}
    const t=TYPE[b.type];const tag=b.tag||t.tag;
    let meta=`<span class="m">${SVG.ppl}${b.size}</span>`;
    if(b.caddy)meta+=`<span class="m">${SVG.cad}Caddy</span>`;
    if(b.cart)meta+=`<span class="m">${SVG.cart}Cart</span>`;
    html+=`<div class="cell crs-${c.crs}"><div class="bk" style="--c:${t.c}">
      <div class="av">${ini(b.name)}</div>
      <div class="bk-body">
        <div class="bk-name">${b.name}${b.size>1?`<span class="grp">+${b.size-1}</span>`:''}</div>
        <div class="bk-meta">${meta}</div>
      </div>
      ${tag?`<div class="tag">${tag}</div>`:''}
      ${b.paid?'<div class="paid"></div>':''}
    </div></div>`;
  });
  html+='</div>';
});
g.innerHTML=html;

// theme toggle
document.getElementById('themeBtn').onclick=()=>{
  const r=document.documentElement;r.dataset.theme=r.dataset.theme==='dark'?'light':'dark';
};
</script>
</body>
</html>
