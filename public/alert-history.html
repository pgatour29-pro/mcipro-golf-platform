<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emergency Alert History — MyCaddiPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #0a0f1a, #1a1a2e); color: #e2e8f0; min-height: 100vh; }
        .alert-card { border-radius: 12px; padding: 12px; margin-bottom: 8px; border-left: 4px solid; }
        .alert-active { background: rgba(239,68,68,0.1); border-left-color: #ef4444; }
        .alert-acknowledged { background: rgba(245,158,11,0.1); border-left-color: #f59e0b; }
        .alert-resolved { background: rgba(34,197,94,0.1); border-left-color: #22c55e; }
        .status-badge { padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .status-active { background: #dc2626; color: white; }
        .status-acknowledged { background: #f59e0b; color: #422006; }
        .status-resolved { background: #22c55e; color: #052e16; }
        .filter-btn { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #94a3b8; transition: all 0.2s; }
        .filter-btn.active { background: rgba(34,197,94,0.2); border-color: #22c55e; color: #86efac; }
        .back-btn { display: inline-flex; align-items: center; gap: 4px; color: #22c55e; font-size: 13px; font-weight: 600; cursor: pointer; padding: 8px 0; text-decoration: none; }
    </style>
</head>
<body>
    <div style="max-width: 600px; margin: 0 auto; padding: 12px;">
        <a href="/" class="back-btn" onclick="window.history.back(); return false;">
            <span class="material-symbols-outlined" style="font-size:18px;">arrow_back</span> Back
        </a>

        <div style="text-align:center; margin: 8px 0 16px;">
            <div style="font-size: 32px;">🚨</div>
            <h1 style="font-size: 20px; font-weight: 800; color: #ffffff;">Emergency Alert History</h1>
            <div style="font-size: 12px; color: #64748b; margin-top: 4px;" id="alertCount">Loading...</div>
        </div>

        <!-- Filters -->
        <div style="display:flex; gap:6px; margin-bottom: 12px; flex-wrap: wrap;">
            <button class="filter-btn active" onclick="setFilter('all')" id="filterAll">All</button>
            <button class="filter-btn" onclick="setFilter('active')" id="filterActive">🔴 Active</button>
            <button class="filter-btn" onclick="setFilter('resolved')" id="filterResolved">🟢 Resolved</button>
            <button class="filter-btn" onclick="setFilter('medical')" id="filterMedical">🚑 Medical</button>
            <button class="filter-btn" onclick="setFilter('weather')" id="filterWeather">⛈️ Weather</button>
        </div>

        <!-- Alert List -->
        <div id="alertList">
            <div style="text-align:center; padding: 40px; color: #64748b;">Loading alerts...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase-config.js"></script>
    <script>
    let allAlerts = [];
    let currentFilter = 'all';

    async function loadAlerts() {
        const sb = window.SupabaseDB?.client;
        if (!sb) { setTimeout(loadAlerts, 500); return; }

        const { data, error } = await sb
            .from('emergency_alerts')
            .select('*')
            .order('timestamp', { ascending: false })
            .limit(200);

        if (error) {
            document.getElementById('alertList').innerHTML = '<div style="padding:20px;text-align:center;color:#ef4444;">Error loading alerts</div>';
            return;
        }

        allAlerts = data || [];
        renderAlerts();
    }

    const typeIcons = {
        medical: '🚑', lightning_warning: '⚡', stop_play: '🛑', resume_play: '✅',
        weather: '⛈️', security: '🛡️', equipment: '🚗', cart_path_only: '🛤️',
        carts_on_fairways: '⛳'
    };

    function renderAlerts() {
        let filtered = allAlerts;
        if (currentFilter === 'active') filtered = allAlerts.filter(a => a.status === 'active');
        else if (currentFilter === 'resolved') filtered = allAlerts.filter(a => a.status === 'resolved');
        else if (currentFilter === 'medical') filtered = allAlerts.filter(a => a.type === 'medical');
        else if (currentFilter === 'weather') filtered = allAlerts.filter(a => ['weather', 'lightning_warning', 'stop_play'].includes(a.type));

        const active = allAlerts.filter(a => a.status === 'active').length;
        document.getElementById('alertCount').textContent = `${allAlerts.length} total alerts · ${active} active`;

        if (filtered.length === 0) {
            document.getElementById('alertList').innerHTML = '<div style="padding:40px;text-align:center;color:#64748b;">No alerts found</div>';
            return;
        }

        document.getElementById('alertList').innerHTML = filtered.map(a => {
            const icon = typeIcons[a.type] || '🚨';
            const statusClass = a.status === 'active' ? 'alert-active' : a.status === 'resolved' ? 'alert-resolved' : 'alert-acknowledged';
            const badgeClass = a.status === 'active' ? 'status-active' : a.status === 'resolved' ? 'status-resolved' : 'status-acknowledged';
            const time = new Date(a.timestamp).toLocaleString('en-GB', { timeZone: 'Asia/Bangkok', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
            const courseLine = a.course_name ? `📍 ${a.course_name}${a.current_hole ? ' · Hole ' + a.current_hole : ''}` : '';
            const groupLine = a.group_members ? `👥 ${a.group_members}` : '';
            const societyLine = a.society_name ? `🏌️ ${a.society_name}` : '';
            const gpsLine = a.location_lat ? `🛰️ ${a.location_lat.toFixed(4)}, ${a.location_lng.toFixed(4)}` : '';
            const resolveBtn = a.status === 'active' ? `<button onclick="resolveAlert('${a.id}')" style="margin-top:8px;padding:6px 14px;background:#22c55e;color:white;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;">✓ Resolve</button>` : '';
            const resolvedInfo = a.resolved_at ? `<div style="font-size:10px;color:#22c55e;margin-top:4px;">Resolved ${new Date(a.resolved_at).toLocaleString('en-GB', { timeZone: 'Asia/Bangkok' })}${a.resolved_by ? ' by ' + a.resolved_by : ''}</div>` : '';

            return `
                <div class="alert-card ${statusClass}">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                        <div style="flex:1;">
                            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
                                <span style="font-size:18px;">${icon}</span>
                                <span style="font-size:14px;font-weight:700;color:#ffffff;">${a.message || a.type}</span>
                            </div>
                            <div style="font-size:12px;color:#94a3b8;">👤 ${a.user_name || 'Unknown'} · ${time}</div>
                            ${courseLine ? `<div style="font-size:11px;color:#94a3b8;margin-top:2px;">${courseLine}</div>` : ''}
                            ${groupLine ? `<div style="font-size:11px;color:#94a3b8;">${groupLine}</div>` : ''}
                            ${societyLine ? `<div style="font-size:11px;color:#94a3b8;">${societyLine}</div>` : ''}
                            ${gpsLine ? `<div style="font-size:10px;color:#64748b;">${gpsLine}</div>` : ''}
                            ${resolvedInfo}
                        </div>
                        <div style="flex-shrink:0;margin-left:8px;">
                            <span class="status-badge ${badgeClass}">${a.status}</span>
                        </div>
                    </div>
                    ${resolveBtn}
                </div>
            `;
        }).join('');
    }

    function setFilter(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('filter' + filter.charAt(0).toUpperCase() + filter.slice(1))?.classList.add('active');
        if (filter === 'all') document.getElementById('filterAll').classList.add('active');
        renderAlerts();
    }

    async function resolveAlert(alertId) {
        const sb = window.SupabaseDB?.client;
        if (!sb) return;

        const { error } = await sb
            .from('emergency_alerts')
            .update({
                status: 'resolved',
                resolved_at: new Date().toISOString(),
                resolved_by: 'Admin'
            })
            .eq('id', alertId);

        if (error) {
            alert('Failed to resolve: ' + error.message);
            return;
        }

        // Update local data
        const idx = allAlerts.findIndex(a => a.id === alertId);
        if (idx !== -1) {
            allAlerts[idx].status = 'resolved';
            allAlerts[idx].resolved_at = new Date().toISOString();
        }
        renderAlerts();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadAlerts);
    } else {
        loadAlerts();
    }
    </script>
</body>
</html>
