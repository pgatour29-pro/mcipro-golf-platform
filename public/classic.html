<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chiang Mai Classic — Order of Merit</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: radial-gradient(1200px 600px at 50% -10%, #0d2818 0%, #0a0f1a 45%, #070b14 100%); color: #e2e8f0; min-height: 100vh; }
        .wrap { max-width: 680px; margin: 0 auto; padding: 12px; }
        .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; }
        .gold { color: #fbbf24; } .silver { color: #cbd5e1; } .bronze { color: #f59e0b; }

        /* Banner */
        .banner { position: relative; overflow: hidden; border-radius: 18px; padding: 22px 18px; text-align: center;
                  background: linear-gradient(135deg, rgba(34,197,94,0.18), rgba(16,185,129,0.06)); border: 1px solid rgba(34,197,94,0.28); }
        .banner h1 { font-size: 27px; font-weight: 900; letter-spacing: 0.5px; color: #fff; line-height: 1.05; text-shadow: 0 2px 14px rgba(0,0,0,0.4); }
        .banner .sub { font-size: 13px; color: #86efac; font-weight: 600; margin-top: 6px; }
        .banner .pool { display:inline-flex; align-items:center; gap:6px; margin-top:12px; padding:6px 14px; border-radius:999px;
                        background: rgba(251,191,36,0.14); border:1px solid rgba(251,191,36,0.35); color:#fcd34d; font-size:12px; font-weight:700; }

        /* Schedule strip */
        .sched { display:flex; gap:6px; overflow-x:auto; padding:2px; -webkit-overflow-scrolling:touch; }
        .sched::-webkit-scrollbar { display:none; }
        .sround { flex:0 0 auto; min-width:96px; border-radius:12px; padding:10px 10px; text-align:center; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); cursor:pointer; transition:all .15s; }
        .sround:hover { background:rgba(255,255,255,0.07); }
        .sround.rest { opacity:0.5; cursor:default; }
        .sround .rno { font-size:11px; font-weight:800; color:#94a3b8; letter-spacing:0.5px; text-transform:uppercase; }
        .sround .ven { font-size:12px; font-weight:700; color:#e2e8f0; margin-top:2px; line-height:1.15; min-height:28px; display:flex; align-items:center; justify-content:center; }
        .sround .dt { font-size:10px; color:#64748b; margin-top:3px; }
        .badge { display:inline-block; margin-top:6px; font-size:9px; font-weight:800; padding:2px 7px; border-radius:999px; text-transform:uppercase; letter-spacing:0.4px; }
        .b-done { background:rgba(34,197,94,0.18); color:#86efac; }
        .b-live { background:rgba(59,130,246,0.18); color:#93c5fd; }
        .b-soon { background:rgba(148,163,184,0.15); color:#cbd5e1; }
        .b-wait { background:rgba(251,146,60,0.15); color:#fdba74; }

        /* Standings table */
        .om-head { display:flex; align-items:center; padding:8px 10px; font-size:9px; font-weight:800; color:#64748b; text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid rgba(255,255,255,0.08); }
        .om-row { display:flex; align-items:center; padding:10px; border-bottom:1px solid rgba(255,255,255,0.05); cursor:pointer; transition:background .15s; }
        .om-row:hover { background:rgba(255,255,255,0.04); }
        .om-row.leader { background:linear-gradient(90deg, rgba(251,191,36,0.12), transparent 70%); }
        .pos { width:30px; text-align:center; flex-shrink:0; }
        .pos .n { display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:50%; font-size:12px; font-weight:800; background:rgba(255,255,255,0.08); color:#cbd5e1; }
        .pos .n.p1 { background:linear-gradient(135deg,#fbbf24,#f59e0b); color:#422006; }
        .pos .n.p2 { background:linear-gradient(135deg,#e2e8f0,#94a3b8); color:#1e293b; }
        .pos .n.p3 { background:linear-gradient(135deg,#f59e0b,#d97706); color:#fff; }
        .rcell { width:34px; text-align:center; font-size:12px; color:#94a3b8; flex-shrink:0; }
        .rcell.has { color:#86efac; font-weight:700; }
        .tot { width:52px; text-align:center; font-size:17px; font-weight:900; color:#22c55e; flex-shrink:0; }
        .detail { display:none; padding:6px 12px 14px 40px; background:rgba(255,255,255,0.02); font-size:12px; }
        .detail.open { display:block; }
        .dline { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px dashed rgba(255,255,255,0.06); }
        .pill { display:inline-block; padding:2px 7px; border-radius:6px; font-size:11px; font-weight:700; }
        .search-input { width:100%; padding:10px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.07); color:#e2e8f0; font-size:14px; outline:none; }
        .search-input:focus { border-color:#22c55e; }
        .tabbtn { flex:1; padding:9px; text-align:center; font-size:12px; font-weight:700; color:#94a3b8; border-radius:10px; cursor:pointer; }
        .tabbtn.on { background:rgba(34,197,94,0.15); color:#86efac; }
        .muted { color:#64748b; }
    </style>
</head>
<body>
    <div class="wrap">
        <div id="banner" style="margin-bottom:14px;"></div>

        <!-- Schedule -->
        <div class="card" style="padding:12px; margin-bottom:14px;">
            <div style="font-size:11px;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Schedule</div>
            <div id="schedule" class="sched"></div>
        </div>

        <!-- View toggle -->
        <div class="card" style="display:flex; gap:4px; padding:4px; margin-bottom:12px;">
            <div class="tabbtn on" id="tab-om" onclick="setView('om')">🏆 Order of Merit</div>
            <div class="tabbtn" id="tab-round" onclick="setView('round')">⛳ By Round</div>
        </div>

        <!-- Search -->
        <div style="margin-bottom:10px;">
            <input type="text" id="searchInput" class="search-input" placeholder="Search player..." oninput="render()">
        </div>

        <!-- Content -->
        <div id="content" class="card" style="overflow:hidden;">
            <div style="padding:24px; text-align:center; color:#64748b;">Loading…</div>
        </div>

        <div style="text-align:center; padding:18px 0; color:#475569; font-size:11px;">
            Order of Merit · Running total over 4 rounds · MyCaddiPro
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase-config.js"></script>
    <script>
    const SERIES_ID = new URLSearchParams(location.search).get('series') || 'chiang_mai_classic_2026';
    let SERIES = null;
    let ROUNDS = [];           // [{eventId, roundNo, venue, date, status, published}]
    let RESULTS = {};          // eventId -> [{player_id, player_name, position, points, score}]
    let STANDINGS = [];        // [{id, name, per:{eventId:pts}, total, played, best}]
    let VIEW = 'om';
    let activeRoundIdx = 0;

    const todayISO = () => { const d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };

    async function load() {
        const sb = window.SupabaseDB?.client;
        if (!sb) { setTimeout(load, 400); return; }

        // 1) series
        const { data: s, error: se } = await sb.from('event_series').select('*').eq('id', SERIES_ID).maybeSingle();
        if (se || !s) { fail('Series not found'); return; }
        SERIES = s;

        // 2) round events
        const ids = Array.isArray(s.round_event_ids) ? s.round_event_ids : [];
        let events = [];
        if (ids.length) {
            const { data: ev } = await sb.from('society_events')
                .select('id, title, event_date, course_name, status, point_allocation')
                .in('id', ids);
            events = ev || [];
        }
        // order by date, build round meta
        events.sort((a,b) => (a.event_date||'').localeCompare(b.event_date||''));
        ROUNDS = events.map((e, i) => ({
            eventId: String(e.id),
            roundNo: i + 1,
            venue: cleanVenue(e.course_name || titleVenue(e.title)),
            date: e.event_date,
            title: e.title,
            status: 'soon', published: false
        }));

        // 3) results for those events
        if (ROUNDS.length) {
            const { data: rows } = await sb.from('event_results')
                .select('event_id, player_id, player_name, position, points_earned, score, score_type')
                .in('event_id', ROUNDS.map(r => r.eventId));
            (rows || []).forEach(r => {
                const k = String(r.event_id);
                (RESULTS[k] = RESULTS[k] || []).push(r);
            });
        }

        // round status
        const t = todayISO();
        ROUNDS.forEach(r => {
            const has = (RESULTS[r.eventId] || []).length > 0;
            r.published = has;
            if (has) r.status = 'done';
            else if (r.date < t) r.status = 'wait';     // played, not yet published
            else if (r.date === t) r.status = 'live';
            else r.status = 'soon';
        });
        activeRoundIdx = Math.max(0, ROUNDS.findIndex(r => r.published) === -1
            ? ROUNDS.findIndex(r => r.status === 'live' || r.status === 'soon')
            : lastPublishedIdx());
        if (activeRoundIdx < 0) activeRoundIdx = 0;

        buildStandings();
        renderBanner();
        renderSchedule();
        render();
    }

    function lastPublishedIdx() { let idx = 0; ROUNDS.forEach((r,i)=>{ if (r.published) idx = i; }); return idx; }

    function buildStandings() {
        const map = {};
        ROUNDS.forEach(r => {
            (RESULTS[r.eventId] || []).forEach(row => {
                const id = row.player_id || row.player_name;
                if (!id) return;
                const p = map[id] || (map[id] = { id, name: row.player_name || 'Player', per: {}, total: 0, played: 0, best: 0 });
                const pts = Number(row.points_earned) || 0;
                p.per[r.eventId] = pts;
                p.total += pts;
                p.played += 1;
                if (pts > p.best) p.best = pts;
                if (row.player_name) p.name = row.player_name;
            });
        });
        STANDINGS = Object.values(map).sort((a,b) =>
            b.total - a.total || b.best - a.best || b.played - a.played || a.name.localeCompare(b.name));
    }

    // ---- helpers ----
    function titleVenue(t) { const m = (t||'').split('—'); return (m[1] || t || '').replace(/^\s*R\d+\s*/,'').trim(); }
    function cleanVenue(v) { return (v||'').replace(/\s*\(Chiang Mai\)\s*/i,'').replace(/\s*(Country Club|Golf Club|Golf & Spa Resort|Club & Resort|CC)\s*$/i,'').trim() || v; }
    function shortName(n) { n = (n||'').trim(); if (n.includes(',')) { const [l,f] = n.split(','); return (f.trim()+' '+l.trim()).trim(); } return n; }

    function fail(msg) { document.getElementById('content').innerHTML = `<div style="padding:24px;text-align:center;color:#ef4444;">${msg}</div>`; }

    function renderBanner() {
        const c = SERIES.config || {};
        const pool = c.prizePool ? `<div class="pool"><span class="material-symbols-outlined" style="font-size:15px;">emoji_events</span>${Number(c.prizePool).toLocaleString()} ${c.currency||'THB'} prize pool</div>` : '';
        const orgs = Array.isArray(SERIES.organizers) ? SERIES.organizers : [];
        const orgLine = orgs.length ? `<div style="font-size:11px;color:#64748b;margin-top:10px;">Organised by ${orgs.map(o => `${o.name}${o.phone?` <span style="color:#94a3b8;">${o.phone}</span>`:''}`).join(' · ')}</div>` : '';
        document.getElementById('banner').innerHTML = `
            <div class="banner">
                <div style="font-size:30px;margin-bottom:2px;">🏆⛳</div>
                <h1>${SERIES.name || 'Order of Merit'}</h1>
                <div class="sub">${SERIES.subtitle || ''}</div>
                ${pool}
                ${c.scoring ? `<div style="font-size:11px;color:#94a3b8;margin-top:10px;line-height:1.4;">${c.scoring}</div>` : ''}
                ${orgLine}
            </div>`;
    }

    function renderSchedule() {
        const c = SERIES.config || {};
        const sched = Array.isArray(c.schedule) ? c.schedule : [];
        // Map round-type schedule entries to ROUNDS for status; show functions/rest too
        let roundCursor = 0;
        const html = sched.map(item => {
            if (item.type === 'round') {
                const r = ROUNDS[roundCursor]; roundCursor++;
                const idx = roundCursor - 1;
                const badge = r ? statusBadge(r.status) : '';
                const venue = r ? r.venue : cleanVenue(item.detail);
                return `<div class="sround" onclick="gotoRound(${idx})">
                    <div class="rno">Round ${idx+1}</div>
                    <div class="ven">${venue}</div>
                    <div class="dt">${fmtDate(item.date)}</div>
                    ${badge}
                </div>`;
            }
            const icon = item.type === 'rest' ? '😴' : '🎉';
            return `<div class="sround rest">
                    <div class="rno">${item.type==='rest'?'Rest':'Event'}</div>
                    <div class="ven">${icon} ${item.label}</div>
                    <div class="dt">${fmtDate(item.date)}</div>
                </div>`;
        }).join('');
        document.getElementById('schedule').innerHTML = html || '<div class="muted" style="font-size:12px;">No schedule</div>';
    }

    function statusBadge(st) {
        if (st === 'done') return '<span class="badge b-done">Results in</span>';
        if (st === 'live') return '<span class="badge b-live">Today</span>';
        if (st === 'wait') return '<span class="badge b-wait">Pending</span>';
        return '<span class="badge b-soon">Upcoming</span>';
    }
    function fmtDate(iso) { if (!iso) return ''; const d = new Date(iso+'T00:00:00'); return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}); }

    function setView(v) { VIEW = v;
        document.getElementById('tab-om').classList.toggle('on', v==='om');
        document.getElementById('tab-round').classList.toggle('on', v==='round');
        render();
    }
    function gotoRound(idx) { activeRoundIdx = idx; setView('round'); }

    function render() {
        if (!SERIES) return;
        if (VIEW === 'om') renderOM(); else renderRound();
    }

    function renderOM() {
        const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
        const rows = q ? STANDINGS.filter(p => shortName(p.name).toLowerCase().includes(q) || p.name.toLowerCase().includes(q)) : STANDINGS;

        if (!STANDINGS.length) {
            document.getElementById('content').innerHTML = `<div style="padding:28px;text-align:center;color:#94a3b8;">
                <div style="font-size:34px;margin-bottom:8px;">⛳</div>
                <div style="font-weight:700;color:#e2e8f0;">No results yet</div>
                <div style="font-size:12px;margin-top:4px;">The Order of Merit fills in as each round is published.</div></div>`;
            return;
        }

        let head = `<div class="om-head"><span class="pos">#</span><span style="flex:1;padding-left:6px;">Player</span>`;
        ROUNDS.forEach(r => head += `<span class="rcell">R${r.roundNo}</span>`);
        head += `<span class="tot">Total</span></div>`;

        const body = rows.map((p, i) => {
            const rank = STANDINGS.indexOf(p) + 1;
            const pc = rank<=3 ? `p${rank}` : '';
            const crown = rank===1 ? ' 👑' : '';
            const cells = ROUNDS.map(r => {
                const v = p.per[r.eventId];
                return `<span class="rcell ${v!=null?'has':''}">${v!=null? v : '–'}</span>`;
            }).join('');
            return `<div class="om-row ${rank===1?'leader':''}" onclick="toggleD('d${i}')">
                <span class="pos"><span class="n ${pc}">${rank}</span></span>
                <div style="flex:1;padding-left:6px;min-width:0;">
                    <div style="font-size:14px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${shortName(p.name)}${crown}</div>
                    <div style="font-size:10px;color:#64748b;">${p.played} of ${ROUNDS.length} rounds</div>
                </div>
                ${cells}
                <span class="tot">${p.total}</span>
            </div>
            <div id="d${i}" class="detail">
                ${ROUNDS.map(r => {
                    const v = p.per[r.eventId];
                    return `<div class="dline"><span class="muted">R${r.roundNo} · ${r.venue}</span><span>${v!=null? `<span class="pill" style="background:rgba(34,197,94,0.15);color:#86efac;">+${v} pts</span>` : '<span class="muted">—</span>'}</span></div>`;
                }).join('')}
                <div class="dline" style="border:none;padding-top:8px;"><span style="font-weight:700;">Total</span><span style="font-weight:900;color:#22c55e;">${p.total} pts</span></div>
            </div>`;
        }).join('');

        document.getElementById('content').innerHTML = head + body;
    }

    function renderRound() {
        const r = ROUNDS[activeRoundIdx];
        if (!r) { fail('No round'); return; }
        const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();

        // round nav chips
        const nav = `<div style="display:flex;gap:6px;overflow-x:auto;padding:10px;border-bottom:1px solid rgba(255,255,255,0.08);">
            ${ROUNDS.map((rr,i)=>`<button onclick="activeRoundIdx=${i};render()" style="flex:0 0 auto;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:700;border:1px solid ${i===activeRoundIdx?'rgba(34,197,94,0.5)':'rgba(255,255,255,0.1)'};background:${i===activeRoundIdx?'rgba(34,197,94,0.15)':'transparent'};color:${i===activeRoundIdx?'#86efac':'#94a3b8'};white-space:nowrap;">R${rr.roundNo}</button>`).join('')}
        </div>`;

        const hdr = `<div style="padding:12px 12px 6px;">
            <div style="font-size:16px;font-weight:800;color:#fff;">Round ${r.roundNo} — ${r.venue}</div>
            <div style="font-size:12px;color:#64748b;">${fmtDate(r.date)} · ${statusBadge(r.status).replace(/<[^>]+>/g,'').trim() || ''}</div>
        </div>`;

        let rowsData = (RESULTS[r.eventId] || []).slice().sort((a,b)=>(a.position||999)-(b.position||999));
        if (q) rowsData = rowsData.filter(x => (x.player_name||'').toLowerCase().includes(q));

        let inner;
        if (!(RESULTS[r.eventId] || []).length) {
            inner = `<div style="padding:24px;text-align:center;color:#94a3b8;">
                <div style="font-size:30px;margin-bottom:6px;">${r.status==='soon'?'📅':'⏳'}</div>
                <div style="font-weight:700;color:#e2e8f0;">${r.status==='soon'?'Not played yet':'Awaiting published results'}</div>
                <div style="font-size:12px;margin-top:4px;">Results appear here once the organizer publishes this round.</div></div>`;
        } else {
            const h = `<div class="om-head"><span class="pos">#</span><span style="flex:1;padding-left:6px;">Player</span><span class="rcell">Score</span><span class="tot">Pts</span></div>`;
            inner = h + rowsData.map(x => {
                const rank = x.position || '';
                const pc = rank===1?'p1':rank===2?'p2':rank===3?'p3':'';
                return `<div class="om-row">
                    <span class="pos"><span class="n ${pc}">${rank}</span></span>
                    <div style="flex:1;padding-left:6px;min-width:0;"><div style="font-size:14px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${shortName(x.player_name)}</div></div>
                    <span class="rcell has">${x.score!=null?x.score:'–'}</span>
                    <span class="tot">${Number(x.points_earned)||0}</span>
                </div>`;
            }).join('');
        }
        document.getElementById('content').innerHTML = nav + hdr + inner;
    }

    function toggleD(id) { const el = document.getElementById(id); if (el) el.classList.toggle('open'); }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', load); else load();
    </script>
</body>
</html>
