<!DOCTYPE html>
<html>
<head><title>MciPro Cache Clear</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:20px;text-align:center;">
<h2>Clearing cache...</h2>
<p id="status">Working...</p>
<script>
(async function() {
    const status = document.getElementById('status');
    try {
        // Unregister all service workers
        if ('serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            for (const reg of regs) {
                await reg.unregister();
            }
            status.textContent = 'Service workers cleared (' + regs.length + ')... ';
        }
        // Clear all caches
        if ('caches' in window) {
            const names = await caches.keys();
            for (const name of names) {
                await caches.delete(name);
            }
            status.textContent += 'Caches cleared (' + names.length + ')... ';
        }
        status.textContent += 'Done! Redirecting...';
        setTimeout(function() {
            window.location.href = '/index.html?nocache=' + Date.now();
        }, 1000);
    } catch(e) {
        status.textContent = 'Error: ' + e.message;
    }
})();
</script>
</body>
</html>
