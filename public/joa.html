<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOA Golf Pattaya - MyCaddiPro</title>
    <meta name="description" content="JOA 골프 파타야 - 이벤트 등록, 실시간 스코어카드, 핸디캡 추적. LINE으로 로그인하세요!">
    <link rel="icon" href="images/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { max-width: 420px; width: 100%; }
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .header { background: linear-gradient(135deg, #059669, #047857); padding: 30px 24px; text-align: center; }
        .logo { width: 100px; height: 100px; border-radius: 20px; margin: 0 auto 16px; display: block; object-fit: cover; border: 3px solid rgba(255,255,255,0.3); }
        .header h1 { color: white; font-size: 24px; font-weight: 800; margin-bottom: 4px; }
        .header p { color: rgba(255,255,255,0.8); font-size: 13px; }
        .body { padding: 24px; }
        .features { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .feature { background: #f0fdf4; border-radius: 12px; padding: 14px 10px; text-align: center; }
        .feature-icon { font-size: 24px; margin-bottom: 4px; }
        .feature-title { font-size: 11px; font-weight: 700; color: #111; }
        .feature-desc { font-size: 9px; color: #6b7280; margin-top: 2px; }
        .cta-btn { display: block; width: 100%; padding: 16px; background: linear-gradient(135deg, #059669, #047857); color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; text-align: center; text-decoration: none; margin-bottom: 10px; }
        .cta-btn:hover { opacity: 0.9; }
        .cta-secondary { display: block; width: 100%; padding: 12px; background: #06c755; color: white; border: none; border-radius: 14px; font-size: 14px; font-weight: 700; cursor: pointer; text-align: center; text-decoration: none; }
        .info { text-align: center; margin-top: 16px; padding-top: 16px; border-top: 1px solid #e5e7eb; }
        .info p { font-size: 11px; color: #9ca3af; line-height: 1.6; }
        .lang-toggle { display: flex; gap: 4px; justify-content: center; margin-bottom: 16px; }
        .lang-btn { padding: 4px 12px; border-radius: 8px; border: 1px solid #d1d5db; font-size: 11px; font-weight: 600; cursor: pointer; background: white; color: #374151; }
        .lang-btn.active { background: #059669; color: white; border-color: #059669; }
        .stats { display: flex; justify-content: center; gap: 20px; margin: 16px 0; }
        .stat { text-align: center; }
        .stat-num { font-size: 22px; font-weight: 800; color: #059669; }
        .stat-label { font-size: 10px; color: #6b7280; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <img src="societylogos/JOAgolf.jpeg" alt="JOA Golf" class="logo" onerror="this.style.display='none'">
                <h1 id="title">JOA Golf Pattaya</h1>
                <p id="subtitle">파타야 골프 조인 - 매일 골프 이벤트</p>
            </div>
            <div class="body">
                <div class="lang-toggle">
                    <button class="lang-btn" onclick="setLang('en')">EN</button>
                    <button class="lang-btn active" onclick="setLang('ko')">한국어</button>
                </div>

                <div class="stats">
                    <div class="stat"><div class="stat-num">31</div><div class="stat-label" id="statEvents">월간 이벤트</div></div>
                    <div class="stat"><div class="stat-num">7</div><div class="stat-label" id="statCourses">골프장</div></div>
                    <div class="stat"><div class="stat-num" style="color:#06c755;">FREE</div><div class="stat-label" id="statFree">무료 가입</div></div>
                </div>

                <div class="features">
                    <div class="feature">
                        <div class="feature-icon">📋</div>
                        <div class="feature-title" id="f1">이벤트 등록</div>
                        <div class="feature-desc" id="f1d">원터치 등록</div>
                    </div>
                    <div class="feature">
                        <div class="feature-icon">📊</div>
                        <div class="feature-title" id="f2">실시간 스코어</div>
                        <div class="feature-desc" id="f2d">라이브 스코어카드</div>
                    </div>
                    <div class="feature">
                        <div class="feature-icon">🏌️</div>
                        <div class="feature-title" id="f3">핸디캡 추적</div>
                        <div class="feature-desc" id="f3d">자동 WHS 계산</div>
                    </div>
                    <div class="feature">
                        <div class="feature-icon">🔔</div>
                        <div class="feature-title" id="f4">LINE 알림</div>
                        <div class="feature-desc" id="f4d">이벤트 & 결과 알림</div>
                    </div>
                </div>

                <a href="https://mycaddipro.com" class="cta-btn" id="ctaMain">
                    ⛳ MyCaddiPro 시작하기
                </a>
                <a href="https://line.me/R/ti/p/@mycaddipro" class="cta-secondary" id="ctaLine">
                    💬 LINE으로 로그인
                </a>

                <div class="info">
                    <p id="infoText">MyCaddiPro는 100% 무료입니다.<br>LINE 계정으로 간편 로그인하세요.<br>© 2026 MyCaddiPro</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            ko: {
                subtitle: '파타야 골프 조인 - 매일 골프 이벤트',
                statEvents: '월간 이벤트', statCourses: '골프장', statFree: '무료 가입',
                f1: '이벤트 등록', f1d: '원터치 등록',
                f2: '실시간 스코어', f2d: '라이브 스코어카드',
                f3: '핸디캡 추적', f3d: '자동 WHS 계산',
                f4: 'LINE 알림', f4d: '이벤트 & 결과 알림',
                ctaMain: '⛳ MyCaddiPro 시작하기',
                ctaLine: '💬 LINE으로 로그인',
                infoText: 'MyCaddiPro는 100% 무료입니다.<br>LINE 계정으로 간편 로그인하세요.<br>© 2026 MyCaddiPro'
            },
            en: {
                subtitle: 'Pattaya Golf Join - Daily Golf Events',
                statEvents: 'Monthly Events', statCourses: 'Courses', statFree: 'Free to Join',
                f1: 'Event Registration', f1d: 'One-tap signup',
                f2: 'Live Scoring', f2d: 'Real-time scorecard',
                f3: 'Handicap Tracking', f3d: 'Auto WHS calculation',
                f4: 'LINE Notifications', f4d: 'Events & results alerts',
                ctaMain: '⛳ Get Started on MyCaddiPro',
                ctaLine: '💬 Login with LINE',
                infoText: 'MyCaddiPro is 100% FREE.<br>Login easily with your LINE account.<br>© 2026 MyCaddiPro'
            }
        };
        function setLang(lang) {
            const t = translations[lang];
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            Object.keys(t).forEach(k => {
                const el = document.getElementById(k);
                if (el) el.innerHTML = t[k];
            });
        }
    </script>
</body>
</html>
