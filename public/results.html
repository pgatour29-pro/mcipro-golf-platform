<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Society Results - MyCaddiPro</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <style>
        /* Theme variables — dark default (matches in-app ThemeMode), .theme-light overrides */
        :root {
            --bg:#0f172a; --card:#1e293b; --card2:#273449; --ink:#f1f5f9; --sub:#94a3b8;
            --line:#334155; --green:#22c55e; --green-deep:#16a34a; --gold:#f59e0b;
            --cell:#1e293b; --cell-line:#334155; --band:#273449;
        }
        body.theme-light {
            --bg:#f1f5f9; --card:#ffffff; --card2:#f8fafc; --ink:#0f172a; --sub:#64748b;
            --line:#e2e8f0; --cell:#ffffff; --cell-line:#e2e8f0; --band:#f1f5f9;
        }
        html, body { background: var(--bg); color: var(--ink); }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow-x: clip; }
        .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; }
        .sub { color: var(--sub); }
        .msym { font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal; display:inline-block; line-height:1; vertical-align:middle; }

        /* Society chips */
        .soc-chip { border:1px solid var(--line); background:var(--card); color:var(--sub); border-radius:999px; padding:6px 14px; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; }
        .soc-chip.active { background:var(--green-deep); border-color:var(--green-deep); color:#fff; }

        /* Event strip */
        .ev-strip { display:flex; gap:8px; overflow-x:auto; padding:2px 2px 6px; -webkit-overflow-scrolling:touch; }
        .ev-card { flex:0 0 auto; width:168px; text-align:left; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:9px 11px; cursor:pointer; }
        .ev-card.active { border-color:var(--green); box-shadow:0 0 0 1px var(--green); }
        .ev-card .d { font-size:10px; font-weight:700; color:var(--green); text-transform:uppercase; }
        .ev-card .t { font-size:12.5px; font-weight:700; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
        .ev-card .c { font-size:10.5px; color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }

        /* Tabs */
        .rtab { flex:1; text-align:center; padding:11px 4px 9px; font-size:13.5px; font-weight:800; color:var(--sub); border-bottom:3px solid transparent; cursor:pointer; letter-spacing:.2px; }
        .rtab.active { color:var(--green); border-bottom-color:var(--green); }

        /* Tables */
        .res-table { width:100%; border-collapse:collapse; font-size:13.5px; }
        .res-table th { font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:var(--sub); font-weight:700; padding:8px 8px; border-bottom:1px solid var(--line); background:var(--card2); }
        .res-table td { padding:10px 8px; border-bottom:1px solid var(--line); }
        .winner-row { background: linear-gradient(90deg, rgba(245,158,11,.16), rgba(245,158,11,.05)); }
        .player-btn { display:flex; align-items:center; gap:6px; cursor:pointer; font-weight:600; color:var(--ink); }
        .expand-icon { transition: transform .2s; font-size:18px; color:var(--sub); }
        .expand-icon.expanded { transform: rotate(180deg); }
        .hole-details { display:none; }
        .hole-details.show { display:table-row; }

        /* Hole grid */
        .hole-grid { display:grid; grid-template-columns:repeat(10,1fr); gap:2px; }
        .hole-cell { text-align:center; padding:4px 1px; font-size:11px; border-radius:4px; color:var(--ink); }
        .hole-head { background:var(--band); font-weight:700; font-size:10px; color:var(--sub); }
        .hole-par { color:var(--sub); font-size:9px; }
        .hole-tot { font-weight:800; background:var(--band); }
        .hole-score { background:var(--cell); border:1px solid var(--cell-line); }
        .score-eagle { background:#3b82f6; color:#fff; border-radius:50%; font-weight:bold; box-shadow:0 0 0 2px #1d4ed8; }
        .score-birdie { background:#60a5fa; color:#fff; border-radius:50%; font-weight:bold; }
        .score-bogey { background:#ef4444; color:#fff; font-weight:bold; }
        .score-double { background:#991b1b; color:#fff; font-weight:bold; box-shadow:inset 0 0 0 2px #fca5a5; }
        .score-two { box-shadow:0 0 0 2px var(--green) !important; }
        .score-ace { background:var(--gold); color:#fff; border-radius:50%; font-weight:bold; box-shadow:0 0 0 2px #b45309 !important; }
        .pts-cell { color:var(--green); font-size:9.5px; font-weight:700; }

        /* Podium */
        .podium { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
        .pod-card { border-radius:14px; padding:12px 8px; text-align:center; border:1px solid var(--line); background:var(--card); }
        .pod-1 { border-color:#f59e0b; background:linear-gradient(180deg, rgba(245,158,11,.22), rgba(245,158,11,.05)); }
        .pod-2 { border-color:#94a3b8; background:linear-gradient(180deg, rgba(148,163,184,.20), rgba(148,163,184,.04)); }
        .pod-3 { border-color:#d97706; background:linear-gradient(180deg, rgba(217,119,6,.18), rgba(217,119,6,.04)); }
        .pod-medal { font-size:26px; }
        .pod-name { font-size:13px; font-weight:800; color:var(--ink); margin-top:4px; word-break:break-word; }
        .pod-score { font-size:17px; font-weight:800; color:var(--green); margin-top:2px; }
        .pod-sub { font-size:10.5px; color:var(--sub); margin-top:1px; }

        /* 2s */
        .two-row { display:flex; align-items:center; gap:12px; padding:10px 12px; border-bottom:1px solid var(--line); }
        .two-hole { width:44px; height:44px; border-radius:10px; background:var(--green-deep); color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; flex-shrink:0; }
        .two-hole .h { font-size:16px; font-weight:800; line-height:1; }
        .two-hole .p { font-size:8.5px; font-weight:700; opacity:.85; text-transform:uppercase; }
        /* Aces (hole-in-one) — gold variant of the 2s styling */
        .ace-hole { background:var(--gold) !important; }

        /* Embed mode (?embed=1): rendered inside the app's Event Results tab. The app supplies
           the header/back/theme, so we show content only, transparent over the app canvas,
           and post our height up so the app page stays the single scroller. */
        html.embed, body.embed { background:transparent; }
        body.embed header { display:none; }
        body.embed main { padding-left:0; padding-right:0; }

        .icon-btn { border:1px solid var(--line); background:var(--card); color:var(--sub); border-radius:10px; width:34px; height:34px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .lang-btn { border:1px solid var(--line); background:var(--card); color:var(--ink); border-radius:10px; height:34px; padding:0 10px; font-size:12px; font-weight:800; cursor:pointer; }
        .scroll-x { overflow-x:auto; -webkit-overflow-scrolling:touch; }
        .division-band { font-size:12.5px; font-weight:800; color:var(--ink); background:var(--band); border-radius:8px; padding:7px 11px; margin:12px 0 6px; }
    </style>
</head>
<body>
    <!-- 1-line compact header -->
    <header style="border-bottom:1px solid var(--line); background:var(--card);">

            <span class="msym" style="font-size:22px; color:var(--gold);">emoji_events</span>

            <button class="lang-btn" id="langBtn" title="Language">EN</button>
            <button class="icon-btn" data-theme-toggle onclick="toggleTheme()" title="Theme"><span class="msym theme-toggle-icon" style="font-size:20px;">light_mode</span></button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-3 pb-10">
        <!-- Society chips -->
        <div class="flex gap-2 py-3 scroll-x" id="socChips"></div>

        <!-- Published event strip -->
        <div id="evStripWrap">
            <div class="ev-strip" id="evStrip"><div class="sub text-sm py-2" data-i18n="loading">Loading…</div></div>
        </div>

        <!-- Event view -->
        <div id="eventView" class="hidden">
            <!-- Hero band -->
            <div class="card mt-2 px-4 py-3">
                <div class="flex items-center justify-between gap-3">
                    <div style="min-width:0;">
                        <div class="flex items-center gap-2">
                            <h2 id="evTitle" style="font-size:17px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></h2>
                            <span id="evFinalBadge" class="hidden" style="font-size:10px; font-weight:800; background:var(--green-deep); color:#fff; border-radius:999px; padding:2px 8px;" data-i18n="final">FINAL</span>
                        </div>
                        <div id="evMeta" class="sub" style="font-size:12px; margin-top:2px;"></div>
                    </div>
                    <div class="text-right flex-shrink-0">
                        <div id="evPlayers" style="font-size:15px; font-weight:800; color:var(--green);"></div>
                        <div class="sub" style="font-size:10.5px;" data-i18n="players">players</div>
                    </div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="card mt-3 overflow-hidden">
                <div class="flex" style="border-bottom:1px solid var(--line);">
                    <div class="rtab active" id="tab-winners" onclick="switchTab('winners')" data-i18n="tabWinners">Winners</div>
                    <div class="rtab" id="tab-field" onclick="switchTab('field')" data-i18n="tabField">Full Results</div>
                    <div class="rtab" id="tab-twos" onclick="switchTab('twos')" data-i18n="tabTwos">2s</div>
                    <div class="rtab" id="tab-aces" onclick="switchTab('aces')" data-i18n="tabAces">Aces</div>
                </div>
                <div id="pane-winners" class="p-3"></div>
                <div id="pane-field" class="p-0 hidden"></div>
                <div id="pane-twos" class="p-3 hidden"></div>
                <div id="pane-aces" class="p-3 hidden"></div>
            </div>
        </div>

        <!-- No event selected / empty -->
        <div id="emptyView" class="card mt-2 px-4 py-12 text-center hidden">
            <span class="msym sub" style="font-size:44px;">scoreboard</span>
            <p class="sub mt-2 text-sm" id="emptyMsg" data-i18n="noEvents">No published events yet.</p>
        </div>
    </main>

        function rtLocale(){ return lang==='th'?'th-TH':lang==='ko'?'ko-KR':lang==='ja'?'ja-JP':'en-GB'; }
        function applyStaticI18n(){
            document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = rt(el.getAttribute('data-i18n')); });
            document.getElementById('langBtn').textContent = lang.toUpperCase();
            document.documentElement.lang = lang;
        }
        document.getElementById('langBtn').onclick = function(){
            lang = LANGS[(LANGS.indexOf(lang)+1) % LANGS.length];
            try { localStorage.setItem('mcipro_results_lang', lang); } catch(e){}
            applyStaticI18n();
            renderSocChips(); renderStrip();
            if (state.eventData) renderEvent();
            else refreshEmpty();
        };

        // ---------- Theme (shares mcipro_colorTheme with the app; dark default) ----------
        function applyTheme(){
            let t = 'dark';
            if (EMBED) t = 'light'; // app tab canvas is always light — match it
            else try { const v = localStorage.getItem('mcipro_colorTheme'); if (v==='light'||v==='dark') t = v; } catch(e){}
            document.body.classList.toggle('theme-light', t==='light');
            document.querySelectorAll('[data-theme-toggle] .theme-toggle-icon').forEach(ic => { ic.textContent = t==='light' ? 'dark_mode' : 'light_mode'; });
        }
        function toggleTheme(){
            let t = 'dark';
            try { const v = localStorage.getItem('mcipro_colorTheme'); if (v==='light'||v==='dark') t = v; } catch(e){}
            const next = t==='light' ? 'dark' : 'light';
            try { localStorage.setItem('mcipro_colorTheme', next); } catch(e){}
            applyTheme();
        }
        applyTheme();

        document.getElementById('backBtn').onclick = function(){
            try {
                if (document.referrer && new URL(document.referrer).host === location.host && history.length > 1) { history.back(); return; }
            } catch(e){}
            location.href = '/';
        };

        // ---------- Helpers ----------
        function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function localToday(){
            // Bangkok date — events are Thailand-based, so the "current event" rolls over at Thai
            // midnight (12:00am) regardless of where the viewer is. en-CA formats as YYYY-MM-DD.
            try { return new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Bangkok' }); }
            catch(e){ const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
        }
        function fmtDate(s, opts){
            try { return new Date(s+'T00:00:00').toLocaleDateString(rtLocale(), opts || {weekday:'short', day:'numeric', month:'short', year:'numeric'}); }
            catch(e){ return s||''; }
        }
        function stripPrefix(title, soc){
            let t = String(title||'');
            if (soc) (soc.prefixes||[]).forEach(p => { t = t.split(p).join(''); });
            return t.trim() || String(title||'Event');
        }
        function socForTitle(title){
            const t = String(title||'');
            return SOCIETIES.find(s => (s.prefixes||[]).some(p => t.startsWith(p))) || null;
        }
        function scFormats(sc){ return String(sc.scoring_format||'').toLowerCase(); }

        // ---------- Handicap divisions (flights) ----------
        // Normalize a divisions array to [{name,min,max}]. Boundaries are HANDICAP INDEX
        // values (e.g. 0–14.5), so callers must match on the index, not the playing handicap.
        function normDivisions(raw){
            if (typeof raw === 'string'){ try { raw = JSON.parse(raw); } catch(_){ return null; } }
            if (!Array.isArray(raw) || !raw.length) return null;
            const out = raw.map((d,i) => ({
                name: (d && d.name) || ('Division ' + (i+1)),
                min: parseFloat(d && d.minHandicap!=null ? d.minHandicap : (d && d.min!=null ? d.min : 0)) || 0,
                max: parseFloat(d && d.maxHandicap!=null ? d.maxHandicap : (d && d.max!=null ? d.max : 999))
            })).filter(d => isFinite(d.max));
            return out.length ? out : null;
        }
        function divisionForHandicap(hcpIndex, divisions){
            if (!Array.isArray(divisions) || !divisions.length || hcpIndex==null) return null;
            const h = parseFloat(hcpIndex);
            if (!isFinite(h)) return null;
            for (const d of divisions){ if (h >= d.min && h <= d.max) return d.name; }
            return null;
        }

        // ---------- State ----------
        const state = {
            socKey: null,          // selected society key
            events: [],            // published events of selected society (newest first)
            selectedEventId: null,
            eventData: null,       // { event, results, entries, teamBoards, twos, officialTwos, scoreType, published }
            tab: 'winners',
            stripSeq: 0,           // society/event-list loads
            evSeq: 0,              // event-detail loads (separate so a strip load can't cancel it)
            loadingEventId: null,
            season2s: {},          // cache: 'SOC|year' → aggregated par-3 2s race
            season2sYear: null,
            season1s: {},          // cache: 'SOC|year|all' → aggregated hole-in-one race
            season1sYear: null
        };
        const expandedPlayers = new Set();

        function setUrl(){
            try {
                const p = new URLSearchParams();
                if (state.socKey) p.set('society', state.socKey.toLowerCase());
                if (state.selectedEventId) p.set('event', state.selectedEventId);
                history.replaceState(null, '', location.pathname + '?' + p.toString() + '#' + state.tab);
            } catch(e){}
        }

        // ---------- Society chips ----------
        function renderSocChips(){
            const el = document.getElementById('socChips');
            el.innerHTML = SOCIETIES.map(s =>
                `<button class="soc-chip ${state.socKey===s.key?'active':''}" data-soc="${s.key}">${esc(s.name)}</button>`
            ).join('');
            el.querySelectorAll('[data-soc]').forEach(b => b.onclick = () => selectSociety(b.getAttribute('data-soc')));
        }

        // ---------- Published events of a society ----------
        async function selectSociety(key, keepEvent){
            state.socKey = key;
            try { localStorage.setItem('mcipro_results_soc', key); } catch(e){}
            renderSocChips();
            if (!keepEvent){ state.selectedEventId = null; state.eventData = null; }
            document.getElementById('evStrip').innerHTML = `<div class="sub text-sm py-2">${esc(rt('loading'))}</div>`;
            const soc = SOCIETIES.find(s => s.key===key);
            const seq = ++state.stripSeq;
            try {
                let q = sb.from('society_events').select('id,title,course_name,event_date');
                if (soc.prefixes.length > 1) q = q.or(soc.prefixes.map(p => 'title.ilike.' + p + '%').join(','));
                else q = q.ilike('title', soc.prefixes[0] + '%');
                const { data: evs } = await q.lte('event_date', localToday()).order('event_date', {ascending:false}).limit(300);
                // Listed = published (event_results) OR has scorecards — an unpublished event
                // must still show its players/scores/2s, just without places.
                // Chunks of 10: both tables hold one row PER PLAYER, so bigger chunks can
                // silently hit PostgREST's 1000-row cap and drop events from the strip.
                const ids = (evs||[]).map(e => e.id);
                const listed = new Set();
                const chunks = [];
                for (let i=0; i<ids.length; i+=10) chunks.push(ids.slice(i, i+10));
                await Promise.all(chunks.map(async chunk => {
                    const [rRes, scRes, pRes] = await Promise.all([
                        sb.from('event_results').select('event_id').in('event_id', chunk),
                        sb.from('scorecards').select('event_id').gt('total_gross', 0).in('event_id', chunk),
                        // A set TEE SHEET (event_pairings) also qualifies — matches loadEvent's
                        // full-field gate (v694): the event then lists its whole registered field
                        // as not-started rows, filling in as scores post. Without this, a
                        // tee-sheeted event with no scores yet drops off the strip the day after
                        // (it only survived while it was "today"). event_pairings = 1 row/event.
                        sb.from('event_pairings').select('event_id').in('event_id', chunk)
                    ]);
                    (rRes.data||[]).forEach(x => listed.add(x.event_id));
                    (scRes.data||[]).forEach(x => listed.add(x.event_id));
                    (pRes.data||[]).forEach(x => listed.add(x.event_id));
                }));
                if (seq !== state.stripSeq) return;
                // TODAY's event is ALWAYS current — even before any scores are in — so at 12:01am the
                // new day's event takes over as the default. Other days show only once they have
                // results/scores. (evs is date-desc, so today's event sorts to the front.)
                const _today = localToday();
                state.events = (evs||[]).filter(e => listed.has(e.id) || e.event_date === _today);
                renderStrip();
                if (state.selectedEventId){
                    // deep-linked/current event: don't re-load if it's already loaded or in flight
                    const cur = state.eventData && state.eventData.event && state.eventData.event.id;
                    if (cur !== state.selectedEventId && state.loadingEventId !== state.selectedEventId) loadEvent(state.selectedEventId);
                }
                else if (state.events.length){
                    // Prefer today's event as the current one; otherwise the most recent past event.
                    const todays = state.events.find(e => e.event_date === _today);
                    loadEvent((todays || state.events[0]).id);
                }
                else { showEmpty(rt('noEvents')); setUrl(); }
            } catch(e){
                console.warn('[Results] selectSociety', e);
                if (seq !== state.stripSeq) return;
                document.getElementById('evStrip').innerHTML = `<div class="sub text-sm py-2" style="cursor:pointer;" onclick="selectSociety('${esc(key)}')">${esc(rt('errLoad'))}</div>`;
            }
        }

        function renderStrip(){
            const el = document.getElementById('evStrip');
            const soc = SOCIETIES.find(s => s.key===state.socKey);
            if (!state.events.length){ el.innerHTML = ''; return; }
            el.innerHTML = state.events.map(e => `
                <button class="ev-card ${state.selectedEventId===e.id?'active':''}" data-ev="${esc(e.id)}">
                    <div class="d">${esc(fmtDate(e.event_date, {day:'numeric', month:'short'}))}</div>
                    <div class="t">${esc(stripPrefix(e.title, soc))}</div>
                    <div class="c">${esc(e.course_name||'')}</div>
                </button>`).join('');
            el.querySelectorAll('[data-ev]').forEach(b => b.onclick = () => loadEvent(b.getAttribute('data-ev')));
        }

        function showEmpty(msg){
            // never blank out an event that is showing/loading via deep link
            if (state.eventData || state.loadingEventId) return;
            document.getElementById('eventView').classList.add('hidden');
            const ev = document.getElementById('emptyView');
            ev.classList.remove('hidden');
            document.getElementById('emptyMsg').textContent = msg;
        }
        function refreshEmpty(){
            if (!document.getElementById('emptyView').classList.contains('hidden')) showEmpty(rt('noEvents'));
        }

        // ---------- Event loading ----------
        async function loadEvent(eventId, silent){
            state.selectedEventId = eventId;
            state.loadingEventId = eventId;
            if (!silent) expandedPlayers.clear();
            renderStrip();
            setUrl();
            const seq = ++state.evSeq;
            document.getElementById('emptyView').classList.add('hidden');
            document.getElementById('eventView').classList.remove('hidden');
            // silent = a background re-pull (live score population) — don't flash the loading state.
            if (!silent) {
                document.getElementById('evTitle').textContent = rt('loading');
                document.getElementById('evMeta').textContent = '';
                document.getElementById('evPlayers').textContent = '';
                ['winners','field','twos','aces'].forEach(t => document.getElementById('pane-'+t).innerHTML = `<div class="sub text-sm p-4 text-center">${esc(rt('loading'))}</div>`);
            }
            try {
                const [evRes, resRes, cardRes, winRes, rndRes, pairRes, regRes] = await Promise.all([
                    sb.from('society_events').select('id,title,course_name,event_date,format,society_id,divisions').eq('id', eventId).maybeSingle(),
                    sb.from('event_results').select('*').eq('event_id', eventId).order('position', {ascending:true}),
                    sb.from('scorecards').select(`id, player_id, player_name, total_gross, total_net, handicap, playing_handicap, status, created_at, scoring_format, group_id,
                        scores (hole_number, gross_score, net_score, stableford_points, par, stroke_index)`).eq('event_id', eventId),
                    sb.from('event_winnings').select('player_id, player_name, category, label, notes, division').eq('event_id', eventId),
                    sb.from('rounds').select('id, golfer_id, player_name, total_gross, total_net, total_stableford, holes_played, handicap_used, status').eq('society_event_id', eventId),
                    // Tee sheet made? (the trigger) + the registered field (who to list).
                    // NB: event_pairings has NO 'id' column — key is event_id.
                    sb.from('event_pairings').select('event_id').eq('event_id', eventId).limit(1),
                    sb.from('event_registrations').select('player_id, player_name, handicap, status').eq('event_id', eventId)
                ]);
                if (seq !== state.evSeq) return;
                const event = evRes.data || { id:eventId, title:'Event' };
                const results = resRes.data || [];
                const cards = cardRes.data || [];
                const winnings = winRes.data || [];
                const eventRounds = rndRes.data || [];

                // Resolve the event's handicap divisions (flights). Prefer the event's own
                // divisions; fall back to the society's payout-template flights. Used to split
                // BOTH the winners and the full-results boards into per-division leaderboards.
                let divisions = normDivisions(event.divisions);
                if (!divisions && event.society_id){
                    try {
                        const { data: tpl } = await sb.from('society_payout_templates')
                            .select('divisions').eq('society_id', String(event.society_id)).maybeSingle();
                        if (seq !== state.evSeq) return;
                        divisions = normDivisions(tpl && tpl.divisions);
                    } catch(_){ /* table/col absent → no flighting */ }
                }

                // sync society chip to the event's title if deep-linked cross-society
                const soc = socForTitle(event.title);
                if (soc && soc.key !== state.socKey){ state.socKey = soc.key; renderSocChips(); selectSociety(soc.key, true); }

                // best scorecard per player (most holes, else latest) — same dedup as live.html
                const best = new Map();
                for (const sc of cards){
                    const ex = best.get(sc.player_id);
                    const n = (sc.scores||[]).length, xn = ex ? (ex.scores||[]).length : -1;
                    if (!ex || n > xn || (n === xn && new Date(sc.created_at) > new Date(ex.created_at))) best.set(sc.player_id, sc);
                }
                const unique = [...best.values()];

                const entries = unique.map(sc => {
                    const hs = new Array(18).fill(null), hp = new Array(18).fill(null), hsi = new Array(18).fill(null), hpts = new Array(18).fill(null);
                    let gross=0, net=0, pts=0, holes=0;
                    for (const s of (sc.scores||[])){
                        if (s.hole_number>=1 && s.hole_number<=18){
                            hs[s.hole_number-1] = s.gross_score;
                            hp[s.hole_number-1] = s.par || 4;
                            hsi[s.hole_number-1] = s.stroke_index || null;
                            hpts[s.hole_number-1] = s.stableford_points;
                            gross += s.gross_score||0; net += (s.net_score!=null?s.net_score:(s.gross_score||0));
                            pts += s.stableford_points||0; holes++;
                        }
                    }
                    return { player_id: sc.player_id, player_name: sc.player_name || 'Player',
                             hcp: sc.playing_handicap, hcpIndex: sc.handicap, gross, net, pts, holes,
                             hole_scores: hs, hole_pars: hp, hole_si: hsi, hole_pts: hpts };
                });

                // Union in players who have a COMPLETED round but no scorecard — e.g. guests
                // whose totals the organizer typed straight into `rounds` (no live card, so no
                // hole-by-hole scores). Without this they show on the organizer board (which
                // reads rounds) but vanish from Results (which reads scorecards). No hole data
                // → totals-only row, no expandable grid.
                const haveIds = new Set(entries.map(e => String(e.player_id)));
                const roundOnlyEntries = [];   // rounds with no scorecard — may still have round_holes
                (eventRounds || []).forEach(r => {
                    if (!r.golfer_id || haveIds.has(String(r.golfer_id))) return;
                    if (r.status && r.status !== 'completed') return;
                    const idx = r.handicap_used;
                    const playing = (idx!=null && isFinite(parseFloat(idx))) ? Math.round(parseFloat(idx)) : null;
                    const gross = r.total_gross || 0;
                    const net = (r.total_net!=null) ? r.total_net : (playing!=null ? gross - playing : gross);
                    const en = { player_id: r.golfer_id, player_name: r.player_name || 'Player',
                        hcp: playing, hcpIndex: idx, gross, net, pts: r.total_stableford || 0,
                        holes: r.holes_played || 0, roundOnly: true, _roundId: r.id,
                        hole_scores: new Array(18).fill(null), hole_pars: new Array(18).fill(null),
                        hole_si: new Array(18).fill(null), hole_pts: new Array(18).fill(null) };
                    entries.push(en);
                    roundOnlyEntries.push(en);
                    haveIds.add(String(r.golfer_id));
                });

                // These archived rounds keep their hole-by-hole in `round_holes` (not `scores`).
                // Pull it so their scorecard grid AND their gross 2s show in Results — otherwise a
                // par-3 two entered on the organizer side (round_holes) is invisible to golfers.
                const _rids = roundOnlyEntries.map(e => e._roundId).filter(Boolean);
                if (_rids.length) {
                    const byRound = {};
                    for (let i = 0; i < _rids.length; i += 200) {
                        const { data: rh } = await sb.from('round_holes')
                            .select('round_id, hole_number, gross_score, net_score, stableford_points, par, stroke_index')
                            .in('round_id', _rids.slice(i, i + 200));
                        if (seq !== state.evSeq) return;
                        (rh || []).forEach(h => { (byRound[h.round_id] = byRound[h.round_id] || []).push(h); });
                    }
                    roundOnlyEntries.forEach(en => {
                        const holes = byRound[en._roundId] || [];
                        if (!holes.length) return;   // truly totals-only → stays a totals row
                        holes.forEach(h => {
                            const i = h.hole_number - 1;
                            if (i >= 0 && i < 18) {
                                en.hole_scores[i] = h.gross_score;
                                en.hole_pars[i] = h.par || 4;
                                en.hole_si[i] = h.stroke_index || null;
                                en.hole_pts[i] = h.stableford_points;
                            }
                        });
                        en.roundOnly = false;   // has real hole data now → expandable + counts for 2s
                    });
                }

                // official published row per player
                const pubBy = new Map(); results.forEach(r => { if (!pubBy.has(String(r.player_id))) pubBy.set(String(r.player_id), r); });
                entries.forEach(en => {
                    en.pub = pubBy.get(String(en.player_id)) || null;
                    // A round-only entry with an unresolved name picks up the published name if any.
                    if ((!en.player_name || en.player_name==='Player') && en.pub && en.pub.player_name) en.player_name = en.pub.player_name;
                    // Division: trust the published row when present (organizer's flighting),
                    // otherwise flight live by the player's handicap index so the full-results
                    // board separates correctly even before results are published.
                    en.division = (en.pub && en.pub.division) || divisionForHandicap(en.hcpIndex, divisions) || null;
                });

                // FULL FIELD: once the TEE SHEET has been set for the event, list EVERY registered
                // player. Those with no scorecard/round yet show as not-started ('-' scores), sorted
                // to the bottom, and fill in + move up as scores come in (mirrors the scoring board).
                if (pairRes && pairRes.data && pairRes.data.length) {
                    ((regRes && regRes.data) || []).forEach(r => {
                        if (!r.player_id || haveIds.has(String(r.player_id))) return;
                        if (String(r.status || '').toLowerCase() === 'cancelled') return;
                        const idx = r.handicap;
                        const playing = (idx != null && isFinite(parseFloat(idx))) ? Math.round(parseFloat(idx)) : null;
                        entries.push({ player_id: r.player_id, player_name: r.player_name || 'Player',
                            hcp: playing, hcpIndex: idx, gross: 0, net: 0, pts: 0, holes: 0, _notStarted: true, pub: null,
                            division: divisionForHandicap(idx, divisions) || null,
                            hole_scores: new Array(18).fill(null), hole_pars: new Array(18).fill(null),
                            hole_si: new Array(18).fill(null), hole_pts: new Array(18).fill(null) });
                        haveIds.add(String(r.player_id));
                    });
                }

                const scoreType = (results[0] && results[0].score_type) || ((event.format||'').includes('stroke') ? 'stroke_play' : 'stableford');

                // Order: official positions first (publish applied countback), then the rest by score
                const restSort = (a,b) => {
                    if (!!a._notStarted !== !!b._notStarted) return a._notStarted ? 1 : -1;   // unscored always last
                    return scoreType==='stroke_play' ? (a.gross-b.gross || b.pts-a.pts) : (b.pts-a.pts || a.net-b.net);
                };
                const inPub = entries.filter(e => e.pub).sort((a,b) => (a.pub.position||999)-(b.pub.position||999));
                const outPub = entries.filter(e => !e.pub).sort(restSort);
                const ordered = inPub.concat(outPub);

                // 2s — app-wide standard: gross 2 on any hole (SCR2)
                const twos = [];
                entries.forEach(en => {
                    en.hole_scores.forEach((s,i) => { if (s===2) twos.push({ player_id:en.player_id, player_name:en.player_name, hole:i+1, par:en.hole_pars[i], si:en.hole_si[i] }); });
                });
                twos.sort((a,b) => a.hole-b.hole || String(a.player_name).localeCompare(String(b.player_name)));

                // Aces — a gross 1 on any hole (a hole-in-one)
                const aces = [];
                entries.forEach(en => {
                    en.hole_scores.forEach((s,i) => { if (s===1) aces.push({ player_id:en.player_id, player_name:en.player_name, hole:i+1, par:en.hole_pars[i], si:en.hole_si[i] }); });
                });
                aces.sort((a,b) => a.hole-b.hole || String(a.player_name).localeCompare(String(b.player_name)));

                const teamBoards = await buildTeamBoards(unique, eventId, event, (regRes && regRes.data) || []);
                if (seq !== state.evSeq) return;
                state.loadingEventId = null;

                state.eventData = {
                    event, results, entries: ordered, teamBoards, twos, aces, divisions,
                    officialTwos: winnings.filter(w => w.category==='2s_pot'),
                    officialAces: winnings.filter(w => w.category==='hio_pot'),
                    scoreType, published: results.length > 0
                };
                renderEvent();
            } catch(e){
                console.warn('[Results] loadEvent', e);
                if (seq !== state.evSeq) return;
                state.loadingEventId = null;
                ['winners','field','twos','aces'].forEach(t => document.getElementById('pane-'+t).innerHTML =
                    `<div class="sub text-sm p-4 text-center" style="cursor:pointer;" onclick="loadEvent('${esc(eventId)}')">${esc(rt('errLoad'))}</div>`);
            }
        }

        // ---------- Team boards (ported from live.html — formats live in scorecards.scoring_format) ----------
        async function buildTeamBoards(scorecards, eventId, event, registrations){
            try {
                const cards = scorecards || [];
                const _isScr2 = (e) => { const s = String((e && (e.title || e.name)) || '').toLowerCase(); return /scramble/.test(s) && /(?:^|[^a-z0-9])(?:2|two)[ -]?man/.test(s); };
                const anyWaltz = cards.some(sc => scFormats(sc).includes('waltz'));
                const anyScramble = cards.some(sc => scFormats(sc).includes('scramble')) || _isScr2(event);   // by title too → teams show before any scores
                const anyMatch = cards.some(sc => scFormats(sc).includes('matchplay'));
                if (!anyWaltz && !anyScramble && !anyMatch) return null;

                const best = new Map();
                for (const sc of cards){
                    const ex = best.get(sc.player_id);
                    const tNew = sc.created_at ? Date.parse(sc.created_at) : 0;
                    const tOld = ex && ex.created_at ? Date.parse(ex.created_at) : 0;
                    if (!ex || tNew > tOld || (tNew === tOld && (sc.scores||[]).length > (ex.scores||[]).length)) best.set(sc.player_id, sc);
                }
                const players = new Map();
                best.forEach((sc, pid) => {
                    const holePts = new Array(18).fill(null), holeNets = new Array(18).fill(null), holeGross = new Array(18).fill(null);
                    let pts=0, gross=0, net=0, thru=0;
                    (sc.scores||[]).forEach(h => {
                        if (h.hole_number>=1 && h.hole_number<=18){
                            holePts[h.hole_number-1] = Number(h.stableford_points)||0;
                            holeGross[h.hole_number-1] = (h.gross_score!=null)?Number(h.gross_score):null;
                            holeNets[h.hole_number-1] = (h.net_score!=null)?Number(h.net_score):null;
                            pts += Number(h.stableford_points)||0;
                            gross += Number(h.gross_score)||0;
                            net += (h.net_score!=null)?Number(h.net_score):(Number(h.gross_score)||0);
                            thru = Math.max(thru, h.hole_number);
                        }
                    });
                    players.set(String(pid), { id:String(pid), name:sc.player_name||'Player', group:sc.group_id||'', fmt:scFormats(sc), pts, gross, net, holePts, holeNets, holeGross, thru });
                });

                const boards = { waltz:null, scramble:null, matches:null, labels:[] };

                if (anyWaltz){
                    let teamDefs = [];
                    if (eventId){
                        try {
                            const { data: pairRows } = await sb.from('event_pairings').select('groups').eq('event_id', eventId).limit(1);
                            const raw = (pairRows && pairRows[0] && Array.isArray(pairRows[0].groups)) ? pairRows[0].groups : [];
                            // event_pairings.groups has TWO shapes: legacy array-of-arrays and {players:[...]}
                            teamDefs = raw.map(g => {
                                const ps = Array.isArray(g) ? g : ((g && g.players) || []);
                                return ps.map(x => String(x.playerId || x.id || '')).filter(Boolean);
                            }).filter(ids => ids.length);
                        } catch(e){ console.warn('[Results] Waltz pairings load failed', e); }
                    }
                    if (!teamDefs.length){
                        const byGroup = {};
                        players.forEach(p => { if (p.fmt.includes('waltz')) (byGroup[p.group] = byGroup[p.group]||[]).push(p.id); });
                        teamDefs = Object.values(byGroup);
                    }
                    const wCount = h => ((h-1)%3)+1;
                    const teams = teamDefs.map(ids => {
                        const members = ids.map(id => players.get(String(id))).filter(Boolean);
                        const teamHolePts = new Array(18).fill(null);
                        let total=0, thru=0;
                        for (let h=1; h<=18; h++){
                            const mp = members.map(m => m.holePts[h-1]).filter(p => p!==null && p!==undefined);
                            if (!mp.length) continue;
                            thru = h;
                            const hp = mp.sort((a,b) => b-a).slice(0, wCount(h)).reduce((a,b) => a+b, 0);
                            teamHolePts[h-1] = hp; total += hp;
                        }
                        return { name: members.map(m => m.name).join(' · ')||'Team', total, thru, teamHolePts, members };
                    }).filter(tm => tm.members.length).sort((a,b) => b.total-a.total);
                    if (teams.length){ boards.waltz = teams; boards.labels.push('3-Man Waltz'); }
                }

                if (anyScramble){
                    // Prefer the tee-sheet 2-man teams (shows every team + its 25% handicap even before any
                    // scores). Fall back to clustering scored players by identical hole gross (legacy path).
                    let teamDefs = [];
                    if (eventId){
                        try {
                            const { data: pr2 } = await sb.from('event_pairings').select('groups').eq('event_id', eventId).limit(1);
                            const raw2 = (pr2 && pr2[0] && Array.isArray(pr2[0].groups)) ? pr2[0].groups : [];
                            raw2.forEach(g => {
                                const ps = (Array.isArray(g) ? g : ((g && g.players) || [])).map(x => String(x.playerId || x.id || '')).filter(Boolean);
                                let t = (!Array.isArray(g) && Array.isArray(g.teams) && g.teams.length) ? g.teams.map(pr => pr.map(String)) : [];
                                if (!t.length){ for (let k = 0; k + 1 < ps.length; k += 2) t.push([ps[k], ps[k + 1]]); }
                                t.forEach(pr => { const ids = pr.filter(Boolean); if (ids.length) teamDefs.push(ids); });
                            });
                        } catch(e){ console.warn('[Results] scramble pairings load failed', e); }
                    }
                    const regHcp = {}, regName = {};
                    (registrations || []).forEach(r => { regHcp[String(r.player_id)] = r.handicap; regName[String(r.player_id)] = r.player_name; });
                    if (teamDefs.length){
                        const teams = teamDefs.map(ids => {
                            const scored = ids.map(id => players.get(String(id))).filter(Boolean);
                            const names = ids.map(id => (players.get(String(id)) && players.get(String(id)).name) || regName[String(id)] || 'Player');
                            const sumH = ids.map(id => parseFloat(regHcp[String(id)])).filter(h => !isNaN(h)).reduce((a, b) => a + b, 0);
                            const teamHcp = Math.round(sumH * 0.25);
                            const gross = scored.length ? Math.max.apply(null, scored.map(m => m.gross || 0)) : 0;   // teammates share the team gross
                            const pts = scored.length ? Math.max.apply(null, scored.map(m => m.pts || 0)) : 0;
                            const started = gross > 0;
                            const net = started ? (gross - teamHcp) : 0;
                            const thru = scored.length ? Math.max.apply(null, scored.map(m => m.thru || 0)) : 0;
                            return { name: names.join(' & '), teamHcp, gross, net, pts, thru, started };
                        }).sort((a, b) => (b.started - a.started) || (a.started ? (a.net - b.net) : 0));
                        if (teams.length){ boards.scramble = teams; boards.labels.push('Scramble'); }
                    } else {
                        const clusters = new Map();
                        players.forEach(p => {
                            if (!p.fmt.includes('scramble')) return;
                            const key = p.group + '|' + p.holeGross.join(',');
                            if (!clusters.has(key)) clusters.set(key, { members:[], pts:p.pts, gross:p.gross, net:p.net, thru:p.thru, teamHcp:null, started:true });
                            clusters.get(key).members.push(p.name);
                        });
                        const teams = [...clusters.values()].map(c => ({ ...c, name:c.members.join(' & ') })).sort((a, b) => b.pts - a.pts || a.net - b.net);
                        if (teams.length){ boards.scramble = teams; boards.labels.push('Scramble'); }
                    }
                }

                if (anyMatch){
                    const byGroup = {};
                    players.forEach(p => { if (p.fmt.includes('matchplay')) (byGroup[p.group] = byGroup[p.group]||[]).push(p); });
                    const matches = [];
                    Object.values(byGroup).forEach(g => {
                        if (g.length !== 2) return;
                        const [a,b] = g;
                        let up=0, thru=0;
                        for (let h=0; h<18; h++){
                            const an = a.holeNets[h]!=null ? a.holeNets[h] : a.holeGross[h];
                            const bn = b.holeNets[h]!=null ? b.holeNets[h] : b.holeGross[h];
                            if (an==null || bn==null) continue;
                            thru = h+1;
                            if (an < bn) up++; else if (bn < an) up--;
                        }
                        if (thru) matches.push({ a, b, up, thru });
                    });
                    if (matches.length){ boards.matches = matches; boards.labels.push('Match Play'); }
                }

                return (boards.waltz || boards.scramble || boards.matches) ? boards : null;
            } catch(e){ console.warn('[Results] team boards failed', e); return null; }
        }

        // ---------- Rendering ----------
        function renderEvent(){
            const d = state.eventData;
            if (!d) return;
            const soc = SOCIETIES.find(s => s.key===state.socKey);
            document.getElementById('eventView').classList.remove('hidden');
            document.getElementById('emptyView').classList.add('hidden');
            document.getElementById('evTitle').textContent = stripPrefix(d.event.title, soc);
            const fmtLabel = (d.teamBoards && d.teamBoards.labels.length) ? d.teamBoards.labels.join(' + ')
                : (d.scoreType==='stroke_play' ? 'Stroke Play' : 'Stableford');
            document.getElementById('evMeta').textContent =
                fmtDate(d.event.event_date) + (d.event.course_name ? ' · ' + d.event.course_name : '') + ' · ' + fmtLabel;
            document.getElementById('evPlayers').textContent = String(d.entries.length || d.results.length || 0);
            document.getElementById('evFinalBadge').classList.toggle('hidden', !d.published);
            document.getElementById('evFinalBadge').textContent = d.published ? rt('final') : rt('unpublished');
            document.getElementById('evFinalBadge').style.background = d.published ? 'var(--green-deep)' : '#64748b';
            renderWinners(); renderField(); renderTwos(); renderAces();
            // Unpublished events have NO winners yet — the Winners tab would just say
            // "not published". Open on Full Results (the actual field/scores) instead, unless
            // the viewer explicitly picked a tab (deep link or a manual tap).
            if (!state.tabExplicit) state.tab = d.published ? 'winners' : 'field';
            switchTab(state.tab, true);
        }

        function switchTab(tab, silent){
            state.tab = tab;
            if (!silent) state.tabExplicit = true;
            ['winners','field','twos','aces'].forEach(t => {
                document.getElementById('tab-'+t).classList.toggle('active', t===tab);
                document.getElementById('pane-'+t).classList.toggle('hidden', t!==tab);
            });
            if (!silent) setUrl();
        }

        function medal(pos){ return pos===1?'🥇':pos===2?'🥈':pos===3?'🥉':String(pos==null?'':pos); }
        function scoreLabel(r, scoreType){
            if (r.score==null) return '';
            return scoreType==='stableford' ? (r.score + ' ' + rt('pts').toLowerCase()) : String(r.score);
        }
        // Ordered division keys for a set of boards: configured divisions first (in the
        // organizer's order), then any other named bucket, then the unassigned '' bucket last.
        function orderedDivKeys(present, divisions){
            const keys = [];
            (divisions || []).forEach(dv => { if (present.has(dv.name) && !keys.includes(dv.name)) keys.push(dv.name); });
            [...present].forEach(k => { if (k !== '' && !keys.includes(k)) keys.push(k); });
            if (present.has('')) keys.push('');
            return keys;
        }

        // --- Winners tab ---
        function renderWinners(){
            const d = state.eventData;
            const el = document.getElementById('pane-winners');
            if (!d.published){
                el.innerHTML = `<div class="text-center py-10"><span class="msym sub" style="font-size:40px;">pending</span>
                    <p class="sub text-sm mt-2">${esc(rt('notPublished'))}</p></div>`;
                return;
            }
            // Group official rows by division; each division gets its OWN podium + ranked
            // list (positions are already ranked per-division at publish time).
            const groups = {}; const present = new Set();
            d.results.forEach(r => { const g = r.division || ''; if (!groups[g]) groups[g]=[]; groups[g].push(r); present.add(g); });
            const order = orderedDivKeys(present, d.divisions);

            const podiumHtml = (list) => {
                const top3 = list.filter(r => r.position>=1 && r.position<=3);
                if (!top3.length) return '';
                const cls = { 1:'pod-1', 2:'pod-2', 3:'pod-3' };
                const orderPods = [top3.find(r=>r.position===2), top3.find(r=>r.position===1), top3.find(r=>r.position===3)].filter(Boolean);
                return '<div class="podium mb-3">' + orderPods.map(r => `
                    <div class="pod-card ${cls[r.position]||''}" style="${r.position===1?'transform:translateY(-6px);':''}">
                        <div class="pod-medal">${medal(r.position)}</div>
                        <div class="pod-name">${esc(r.player_name||'Player')}</div>
                        <div class="pod-score">${esc(scoreLabel(r, d.scoreType))}</div>
                        ${r.points_earned ? `<div class="pod-sub">+${esc(r.points_earned)} ${esc(rt('poyPts'))}</div>` : ''}
                    </div>`).join('') + '</div>';
            };

            let html = '';
            order.forEach(g => {
                const list = groups[g].slice().sort((a,b) => (a.position||999)-(b.position||999));
                if (g) html += `<div class="division-band">${esc(g)}</div>`;
                html += podiumHtml(list);
                html += list.map(r => `
                    <div style="display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line);">
                        <span style="width:34px;text-align:center;font-weight:800;font-size:${r.position<=3?'17px':'13.5px'};color:${r.position<=3?'var(--gold)':'var(--sub)'};">${medal(r.position)}</span>
                        <div style="flex:1;min-width:0;font-weight:600;font-size:14px;">${esc(r.player_name||'Player')}</div>
                        <div style="text-align:right;">
                            <div style="font-weight:800;color:var(--green);font-size:14.5px;">${esc(scoreLabel(r, d.scoreType))}</div>
                            ${r.points_earned ? `<div style="font-size:10px;color:var(--sub);">+${esc(r.points_earned)} ${esc(rt('poyPts'))}</div>` : ''}
                        </div>
                    </div>`).join('');
            });
            el.innerHTML = html || `<div class="sub text-sm text-center py-8">${esc(rt('notPublished'))}</div>`;
        }

        // --- Full Results tab ---
        function renderField(){
            const d = state.eventData;
            const el = document.getElementById('pane-field');
            if (!d.entries.length){
                el.innerHTML = `<div class="text-center py-10"><span class="msym sub" style="font-size:40px;">scoreboard</span>
                    <p class="sub text-sm mt-2">${esc(rt('noScores'))}</p></div>`;
                return;
            }
            const teamHtml = renderTeamBoardsHtml(d.teamBoards);
            // Places are OFFICIAL only: if the event has no published results, show no
            // positions/medals/winner highlight anywhere — just the scores.
            const showPlaces = d.published;

            const rowFor = (en, pos) => {
                const pid = String(en.player_id || 'p').replace(/[^A-Za-z0-9_-]/g, '_');
                const twosCount = en.hole_scores.filter(s => s===2).length;
                // No hole-by-hole data (totals-only round) → no expand chevron / detail grid.
                const hasHoles = !en.roundOnly && en.hole_scores.some(s => s!=null);
                return `
                    <tr class="${showPlaces && pos===1 ? 'winner-row' : ''}">
                        <td class="text-center" style="font-weight:800;color:${showPlaces && pos<=3?'var(--gold)':'var(--sub)'};">${showPlaces ? medal(pos) : '-'}</td>
                        <td>
                            <span class="${hasHoles ? 'player-btn' : ''}" ${hasHoles ? `data-player-id="${pid}"` : ''}>
                                ${hasHoles ? `<span class="msym expand-icon" id="icon-${pid}">expand_more</span>` : ''}
                                <span>${esc(en.player_name)}</span>
                                ${twosCount ? `<span style="font-size:9.5px;font-weight:800;color:var(--green);border:1px solid var(--green);border-radius:999px;padding:0 6px;">2s ×${twosCount}</span>` : ''}
                            </span>
                        </td>
                        <td class="text-center sub">${en.hcp!=null ? esc(en.hcp) : '-'}</td>
                        <td class="text-center" style="font-weight:700;">${en.gross || '-'}</td>
                        <td class="text-center" style="font-weight:700;">${en.net || '-'}</td>
                        <td class="text-center" style="font-weight:800;color:var(--green);">${en.pts || '-'}</td>
                    </tr>
                    ${hasHoles ? renderHoleDetails(en, 6, pid) : ''}`;
            };
            const tableFor = (list) => {
                const rows = list.map((en, i) => {
                    const pos = (showPlaces && en.pub && en.pub.position) ? en.pub.position : (i+1);
                    return rowFor(en, pos);
                }).join('');
                return `<div class="scroll-x"><table class="res-table" style="min-width:480px;">
                    <thead><tr>
                        <th class="text-center" style="width:44px;">${esc(rt('pos'))}</th>
                        <th class="text-left">${esc(rt('player'))}</th>
                        <th class="text-center">${esc(rt('hcp'))}</th>
                        <th class="text-center">${esc(rt('gross'))}</th>
                        <th class="text-center">${esc(rt('net'))}</th>
                        <th class="text-center">${esc(rt('pts'))}</th>
                    </tr></thead>
                    <tbody>${rows}</tbody>
                </table></div>`;
            };

            // Split the field into a separate leaderboard per division when the event is
            // flighted; otherwise one combined board (unchanged).
            let boards = '';
            if (d.divisions && d.divisions.length){
                const groups = {}; const present = new Set();
                d.entries.forEach(en => { const g = en.division || ''; if (!groups[g]) groups[g]=[]; groups[g].push(en); present.add(g); });
                orderedDivKeys(present, d.divisions).forEach(g => {
                    if (g) boards += `<div class="division-band" style="margin:14px 12px 4px;">${esc(g)}</div>`;
                    boards += tableFor(groups[g]);
                });
            } else {
                boards = tableFor(d.entries);
            }

            // 2-Man Scramble: the board IS the teams — don't also dump the individual list ("not individuals").
            const scrambleOnly = !!(d.teamBoards && d.teamBoards.scramble && !d.teamBoards.waltz && !d.teamBoards.matches);
            el.innerHTML = `
                ${teamHtml}
                ${(teamHtml && !scrambleOnly) ? `<div class="px-4 pt-3 pb-1" style="font-size:11px;font-weight:800;color:var(--sub);text-transform:uppercase;">${esc(rt('individual'))}</div>` : ''}
                ${scrambleOnly ? '' : `<div class="px-3 pt-2 pb-1 sub" style="font-size:11px;">${esc(rt('tapHint'))}</div>${boards}`}`;
            restoreExpandedState();
        }

        function getScoreClass(score, par){
            if (score===null || par===null) return 'hole-score';
            const diff = score - par;
            let cls;
            if (diff <= -2) cls = 'hole-score score-eagle';
            else if (diff === -1) cls = 'hole-score score-birdie';
            else if (diff === 0) cls = 'hole-score';
            else if (diff === 1) cls = 'hole-score score-bogey';
            else cls = 'hole-score score-double';
            if (score === 1) cls += ' score-ace';
            if (score === 2) cls += ' score-two';
            return cls;
        }

        function renderHoleDetails(en, colspan, pid){
            const nine = (start) => {
                const holes = en.hole_scores.slice(start, start+9);
                const pars = en.hole_pars.slice(start, start+9);
                const pts = en.hole_pts.slice(start, start+9);
                const tot = holes.reduce((s,v) => s+(v||0), 0);
                const ptsTot = pts.reduce((s,v) => s+(v||0), 0);
                return `
                    <div class="hole-grid mb-1">
                        ${holes.map((_,i) => `<div class="hole-cell hole-head">${start+i+1}</div>`).join('')}
                        <div class="hole-cell hole-head">${esc(start===0?rt('out'):rt('inn'))}</div>
                    </div>
                    <div class="hole-grid mb-1">
                        ${pars.map(p => `<div class="hole-cell hole-par">P${p||4}</div>`).join('')}
                        <div class="hole-cell"></div>
                    </div>
                    <div class="hole-grid mb-1">
                        ${holes.map((s,i) => `<div class="hole-cell ${getScoreClass(s, pars[i])}">${s!==null?s:'-'}</div>`).join('')}
                        <div class="hole-cell hole-tot">${tot||'-'}</div>
                    </div>
                    <div class="hole-grid">
                        ${pts.map(p => `<div class="hole-cell pts-cell">${p!=null?p:''}</div>`).join('')}
                        <div class="hole-cell pts-cell" style="font-weight:800;">${ptsTot||''}</div>
                    </div>`;
            };
            return `
                <tr id="details-${pid}" class="hole-details" style="background:var(--card2);">
                    <td colspan="${colspan}" class="p-3">
                        <div style="font-size:11px;font-weight:700;color:var(--sub);margin-bottom:8px;">
                            ${esc(rt('holeByHole'))}
                            <span style="font-weight:400;margin-left:10px;">
                                <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#60a5fa;margin-right:3px;"></span>${esc(rt('birdie'))}
                                <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#3b82f6;margin:0 3px 0 8px;"></span>${esc(rt('eagle'))}
                                <span style="display:inline-block;width:10px;height:10px;background:#ef4444;margin:0 3px 0 8px;"></span>${esc(rt('bogey'))}
                                <span style="display:inline-block;width:10px;height:10px;background:#991b1b;margin:0 3px 0 8px;"></span>${esc(rt('double'))}
                            </span>
                        </div>
                        <div class="mb-2">${nine(0)}</div>
                        <div>${nine(9)}</div>
                        <div class="text-right sub" style="font-size:11px;margin-top:6px;">
                            ${esc(rt('total'))}: <b style="color:var(--ink);">${en.gross||'-'}</b>
                            · ${esc(rt('net'))}: <b style="color:var(--ink);">${en.net||'-'}</b>
                            · <b style="color:var(--green);">${en.pts||0} ${esc(rt('pts')).toLowerCase()}</b>
                        </div>
                    </td>
                </tr>`;
        }

        function togglePlayerDetails(pid){
            const row = document.getElementById('details-'+pid);
            const icon = document.getElementById('icon-'+pid);
            if (!row) return;
            const on = row.classList.toggle('show');
            if (icon) icon.classList.toggle('expanded', on);
            if (on) expandedPlayers.add(pid); else expandedPlayers.delete(pid);
        }
        function restoreExpandedState(){
            expandedPlayers.forEach(pid => {
                const row = document.getElementById('details-'+pid);
                const icon = document.getElementById('icon-'+pid);
                if (row){ row.classList.add('show'); if (icon) icon.classList.add('expanded'); }
            });
        }
        document.addEventListener('click', function(e){
            const p = e.target.closest('.player-btn');
            if (p && p.getAttribute('data-player-id')) togglePlayerDetails(p.getAttribute('data-player-id'));
        });

        // --- 2s tab: this event's 2s + the society's par-3 2s race over the period ---
        function renderTwos(){
            const d = state.eventData;
            const el = document.getElementById('pane-twos');
            let html = '';
            if (!d.twos.length){
                html += `<div class="text-center py-6"><span class="msym sub" style="font-size:40px;">looks_two</span>
                    <p class="sub text-sm mt-2">${esc(rt('noTwos'))}</p></div>`;
            } else {
                const playerCount = new Set(d.twos.map(t => String(t.player_id))).size;
                html += `
                    <div style="display:flex;align-items:center;gap:10px;background:var(--band);border-radius:10px;padding:10px 14px;margin-bottom:10px;">
                        <span class="msym" style="font-size:22px;color:var(--green);">looks_two</span>
                        <div style="font-size:13.5px;font-weight:700;">
                            ${d.twos.length} ${esc(rt('twosSummaryA'))} · ${playerCount} ${esc(rt('twosSummaryB'))}
                        </div>
                    </div>`;
                html += d.twos.map(t => `
                    <div class="two-row">
                        <div class="two-hole"><div class="h">${t.hole}</div><div class="p">${esc(rt('par'))} ${t.par||''}</div></div>
                        <div style="flex:1;min-width:0;">
                            <div style="font-weight:700;font-size:14px;">${esc(t.player_name)}</div>
                            <div class="sub" style="font-size:11px;">${esc(rt('hole'))} ${t.hole}${t.si ? ' · '+esc(rt('si'))+' '+esc(t.si) : ''}</div>
                        </div>
                        <span style="font-size:20px;font-weight:800;color:var(--green);">2</span>
                    </div>`).join('');
                if (d.officialTwos.length){
                    html += `<div class="division-band mt-3">${esc(rt('officialPot'))}</div>`;
                    html += d.officialTwos.map(w => `
                        <div style="display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid var(--line);">

        async function loadSeason2s(socKey, year){
            const key = socKey + '|' + year;
            if (state.season2s[key]) return state.season2s[key];
            const soc = SOCIETIES.find(s => s.key === socKey);
            if (!soc) return { year, list: [] };
            let q = sb.from('society_events').select('id, event_date, course_name');
            if (soc.prefixes.length > 1) q = q.or(soc.prefixes.map(p => 'title.ilike.' + p + '%').join(','));
            else q = q.ilike('title', soc.prefixes[0] + '%');
            const { data: evs } = await q.gte('event_date', year + '-01-01').lte('event_date', year + '-12-31')
                .order('event_date', {ascending: false}).limit(500);
            const events = evs || [];
            const evById = {};
            events.forEach(e => evById[e.id] = e);
            const ids = events.map(e => e.id);
            const byPlayer = new Map(), seen = new Set();
            for (let i = 0; i < ids.length; i += 50){
                // one 2s row per score, parent scorecard embedded — filter on the FK side (!inner)
                const { data: rows } = await sb.from('scores')
                    .select('hole_number, scorecards!inner(event_id, player_id, player_name)')
                    .eq('gross_score', 2).eq('par', 3)
                    .in('scorecards.event_id', ids.slice(i, i + 50))
                    .limit(1000);
                (rows || []).forEach(r => {
                    const sc = r.scorecards; if (!sc) return;
                    // duplicate scorecards for the same player+event must not double-count a 2
                    const dk = sc.event_id + '|' + sc.player_id + '|' + r.hole_number;
                    if (seen.has(dk)) return; seen.add(dk);
                    const pk = String(sc.player_id);
                    if (!byPlayer.has(pk)) byPlayer.set(pk, { player_id: pk, player_name: sc.player_name || 'Player', twos: [] });
                    const ev = evById[sc.event_id] || {};
                    byPlayer.get(pk).twos.push({ hole: r.hole_number, date: ev.event_date, course: ev.course_name });
                });
            }
            const list = [...byPlayer.values()].sort((a, b) =>
                b.twos.length - a.twos.length || String(a.player_name).localeCompare(String(b.player_name)));
            list.forEach(p => p.twos.sort((a, b) => String(b.date || '').localeCompare(String(a.date || ''))));
            const out = { year, list };
            state.season2s[key] = out;
            return out;
        }

            }
        })();

        // Embed height reporting: keep the parent frame sized to our content so the app page
        // scrolls as one (ResizeObserver catches renders; the interval is a safety net).
        // Live-populate: silently re-pull the selected event periodically so scores appear as they
        // come in — unscored players stay at the bottom and move up when their card posts.
        setInterval(function(){ try { if (state.selectedEventId && document.visibilityState !== 'hidden') loadEvent(state.selectedEventId, true); } catch(e){} }, 40000);

        if (EMBED) {
            const _postH = function(){
                try { parent.postMessage({ type:'mciproResultsHeight', h: document.documentElement.scrollHeight }, window.location.origin); } catch(e){}
            };
            try { new ResizeObserver(_postH).observe(document.body); } catch(e){}
            window.addEventListener('load', _postH);
            setInterval(_postH, 1200);
        }
    </script>
</body>
</html>
